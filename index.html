<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap">
<style>
:root{
  --bl:#2a7de1;--bld:#1a56a0;--blbg:#f0f6ff;--bll:#ddeeff;--blb:#c5d8f0;
  --or:#f5a623;--orbg:#fff8e6;
  --gr:#1e8a3c;--grbg:#e6f4ea;--grb:#34a853;
  --rd:#d93025;--tx:#1a2a4a;--tx2:#4a6080;--tx3:#8aaac8;
  --sh:0 2px 12px rgba(26,86,160,.10);
  --rad:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--blbg);color:var(--tx);min-height:100vh;overscroll-behavior:none;padding-bottom:80px;}

header{background:linear-gradient(135deg,#1a56a0,#2a7de1);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.20);position:sticky;top:0;z-index:200;}
header h1{flex:1;font-size:17px;font-weight:800;color:#fff;}

nav{background:#fff;border-bottom:2px solid var(--blb);display:flex;position:sticky;top:56px;z-index:199;height:48px;}
.tab{flex:1;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:var(--tx2);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;}
.tab.active{color:var(--bl);border-bottom-color:var(--bl);}

.panel{display:none;padding:14px;max-width:900px;margin:0 auto;}
.panel.active{display:block;}

.tl{display:flex;flex-direction:column;gap:8px;}
.ti{background:#fff;border:1.5px solid var(--blb);border-radius:12px;padding:11px 13px;display:flex;flex-direction:column;gap:6px;box-shadow:var(--sh);}
.ti-top{display:flex;align-items:center;gap:10px;}
.tn{flex:1;font-weight:700;font-size:14px;color:var(--tx);}
.ta-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;color:var(--tx3);cursor:pointer;}
.ta-btn.drag-handle { cursor: grab; touch-action: none; }
.ta-btn.drag-handle.dragging-active { color: var(--or); transform: scale(1.2); }

.card{background:#fff;border:1.5px solid var(--blb);border-radius:var(--rad);padding:14px;margin-bottom:12px;box-shadow:var(--sh);}
.ct{font-weight:800;font-size:11px;color:var(--bld);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px;}

/* Styles Drag & Drop */
.drag-over-zone { background-color: var(--orbg) !important; border: 2px dashed var(--or) !important; transition: transform 0.2s; transform: scale(1.02); }

/* Calendar Grids */
.mg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.md{background:#fff;border:1.5px solid var(--blb);border-radius:9px;height:72px;padding:5px;cursor:pointer;display:flex;flex-direction:column;position:relative;}
.mn{font-weight:800;font-size:10px;color:var(--tx3);margin-bottom:2px;}
.md.today{border-color:var(--bl);background:var(--blbg);}
.md.today .mn{color:var(--bl);}
.md.other{opacity:.4;}
.mds{flex:1;overflow:hidden;display:flex;flex-direction:column;gap:2px;}
.mev{height:4px;border-radius:2px;}

.wg{display:grid;grid-template-columns:50px repeat(7,1fr);background:var(--blb);gap:1px;border:1.5px solid var(--blb);border-radius:var(--rad);overflow:hidden;}
.wh,.wsl{background:#fff;height:48px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;}
.wh{background:var(--blbg);color:var(--bld);font-size:9px;text-transform:uppercase;}
.wsl{border-top:1px solid #f0f0f0; position: relative;}

.dg{display:grid;grid-template-columns:50px 1fr;background:var(--blb);gap:1px;border:1.5px solid var(--blb);border-radius:var(--rad);overflow:hidden;}
.dh,.day-sl{background:#fff;height:54px;display:flex;align-items:center;padding:0 10px;font-size:12px;font-weight:700;}
.dh{background:var(--blbg);color:var(--bld);font-size:10px;justify-content:center;}
.day-sl { position: relative; }

.sync{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:8px 16px;border-radius:20px;font-size:12px;display:none;z-index:1000;font-weight:700;}
.fab{position:fixed;bottom:20px;right:20px;width:56px;height:56px;border-radius:28px;background:var(--bl);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(42,125,225,.4);border:none;z-index:150;}

/* Task Edit Modal */
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(26,42,74,.6);display:none;align-items:center;justify-content:center;z-index:300;padding:20px;}
.modal-c{background:#fff;width:100%;max-width:400px;border-radius:20px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,.2);}
.modal-c h2{font-size:18px;margin-bottom:15px;color:var(--bld);}
.f-group{margin-bottom:12px;}
.f-group label{display:block;font-size:11px;font-weight:800;color:var(--tx3);margin-bottom:4px;text-transform:uppercase;}
.f-group input, .f-group select, .f-group textarea{width:100%;padding:10px;border:1.5px solid var(--blb);border-radius:10px;font-family:inherit;font-size:14px;color:var(--tx);}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.btn{flex:1;padding:12px;border-radius:12px;border:none;font-weight:800;font-size:14px;cursor:pointer;}
.btn-p{background:var(--bl);color:#fff;}
.btn-s{background:var(--blbg);color:var(--bl);}
</style>
</head>
<body>

<header>
  <div id="sync" class="sync">Mise à jour…</div>
  <h1 id="app-title">Planify</h1>
  <button class="ta-btn" style="color:#fff" onclick="fetchGcal()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
  </button>
</header>

<nav id="nav-tabs">
  <div class="tab active" onclick="showPanel('tasks')">TÂCHES</div>
  <div class="tab" id="tab-ag" onclick="showPanel('ag')">CALENDRIER</div>
</nav>

<div id="p-tasks" class="panel active">
  <div class="ct">À planifier</div>
  <div id="task-list" class="tl"></div>
</div>

<div id="p-ag" class="panel">
  <div style="display:flex;align-items:center;gap:10px;margin-bottom:15px;">
    <button class="ta-btn" onclick="changeDate(-1)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div id="ag-label" style="flex:1;text-align:center;font-weight:800;font-size:15px;color:var(--bld)">Avril 2026</div>
    <button class="ta-btn" onclick="changeDate(1)"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg></button>
    <select id="view-sel" onchange="renderAg()" style="border:none;background:var(--bll);color:var(--bld);padding:5px 10px;border-radius:8px;font-weight:800;font-size:12px;">
      <option value="month">Mois</option>
      <option value="week">Semaine</option>
      <option value="day">Jour</option>
    </select>
  </div>
  <div id="ag-cont"></div>
</div>

<button class="fab" onclick="openTaskEdit(null)">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div id="task-modal" class="modal">
  <div class="modal-c">
    <h2 id="modal-title">Nouvelle tâche</h2>
    <div class="f-group">
      <label>Titre</label>
      <input type="text" id="te-title" placeholder="Ex: Faire les courses">
    </div>
    <div class="f-group">
      <label>Date d'échéance</label>
      <input type="date" id="te-due">
    </div>
    <div class="f-group">
      <label>Description</label>
      <textarea id="te-desc" rows="2"></textarea>
    </div>
    <div class="f-group">
      <label>Rappel (minutes avant)</label>
      <select id="te-remind">
        <option value="0">Aucun</option>
        <option value="10">10 min</option>
        <option value="30">30 min</option>
        <option value="60">1 heure</option>
      </select>
    </div>
    <div class="f-group">
      <label>Récurrence</label>
      <select id="te-recur">
        <option value="">Aucune</option>
        <option value="DAILY">Quotidien</option>
        <option value="WEEKLY">Hebdomadaire</option>
        <option value="MONTHLY">Mensuel</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn btn-s" onclick="closeTaskEdit()">Annuler</button>
      <button class="btn btn-p" onclick="saveTaskEdit()">Enregistrer</button>
    </div>
    <button id="btn-del-task" class="btn" style="width:100%;margin-top:10px;background:var(--rd);color:#fff;display:none;">Supprimer</button>
  </div>
</div>

<script>
/* CONFIGURATION & DATA */
let S = JSON.parse(localStorage.getItem('planify_v1')) || { tasks: [] };
let gcal = [];
let token = null;
let currentViewDate = new Date(); // Pour la navigation calendrier
let _editTaskId = null;

// Drag & Drop State
let longPressTimer;
let currentDragTaskId = null;

function lsSave(){ localStorage.setItem('planify_v1', JSON.stringify(S)); }

/* NAVIGATION */
function showPanel(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  if(id==='tasks') {
    document.querySelector('.tab:nth-child(1)').classList.add('active');
    renderTasks();
  } else {
    document.querySelector('.tab:nth-child(2)').classList.add('active');
    renderAg();
  }
}

/* DRAG & DROP LOGIC */
function setupLongPress(el, taskId) {
  const start = (e) => {
    longPressTimer = setTimeout(() => {
      currentDragTaskId = taskId;
      el.setAttribute('draggable', 'true');
      el.classList.add('dragging-active');
      if(navigator.vibrate) navigator.vibrate(50);
    }, 500);
  };
  const cancel = () => {
    clearTimeout(longPressTimer);
  };
  el.addEventListener('mousedown', start);
  el.addEventListener('touchstart', start, {passive: true});
  el.addEventListener('mouseup', cancel);
  el.addEventListener('touchend', cancel);
  el.addEventListener('touchmove', cancel);
}

function onDragStart(e, taskId) {
  e.dataTransfer.setData("application/planify-id", taskId);
  e.dataTransfer.effectAllowed = "move";
  
  // Ghost element (optionnel)
  const t = S.tasks.find(x => x.id === taskId);
  const ghost = document.createElement('div');
  ghost.textContent = t ? t.title : "Tâche";
  ghost.style.padding = "8px";
  ghost.style.background = "var(--bl)";
  ghost.style.color = "#fff";
  ghost.style.borderRadius = "8px";
  ghost.style.position = "absolute";
  ghost.style.top = "-1000px";
  document.body.appendChild(ghost);
  e.dataTransfer.setDragImage(ghost, 0, 0);
  setTimeout(() => ghost.remove(), 0);

  // Changement d'onglet auto si survol du bouton Calendrier
  const tabAg = document.getElementById('tab-ag');
  tabAg.ondragover = (ev) => { ev.preventDefault(); showPanel('ag'); };
}

async function onTaskDrop(e, dateISO) {
  e.preventDefault();
  const taskId = e.dataTransfer.getData("application/planify-id");
  const task = S.tasks.find(t => t.id === taskId);
  if (!task) return;

  task.due = dateISO;
  lsSave();

  // Sync Google si existant
  const gEvent = gcal.find(ev => ev.id === taskId);
  if (token && gEvent) {
    showSync("Mise à jour calendrier...");
    // fT et updateGcalEvWithRecur devraient être définis ou appelés via votre API existante
    // Ici on simule l'appel de mise à jour date
    updateGcalEvWithRecur(task.id, task.title, task.desc, dateISO, null, null, task.recurrence)
      .then(() => { fetchGcal().then(() => { renderAg(); }); });
  }

  renderTasks();
  renderAg();
}

/* RENDU DES TÂCHES */
function renderTasks(){
  const cont = document.getElementById('task-list');
  const items = S.tasks.filter(t => !t.due);
  if(items.length === 0){
    cont.innerHTML = `<div style="text-align:center;padding:40px;color:var(--tx3);font-size:13px;">Aucune tâche à planifier. Appuyez sur + pour en créer une.</div>`;
    return;
  }
  cont.innerHTML = items.map(t => `
    <div class="ti">
      <div class="ti-top">
        <div class="ta-btn drag-handle" 
             onmousedown="setupLongPress(this, '${t.id}')" 
             ontouchstart="setupLongPress(this, '${t.id}')"
             ondragstart="onDragStart(event, '${t.id}')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
        <div class="tn" onclick="openTaskEdit('${t.id}')">${t.title}</div>
        <button class="ta-btn" onclick="toggleTaskDone('${t.id}')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="5"/></svg>
        </button>
      </div>
    </div>
  `).join('');
}

/* RENDU CALENDRIER */
function changeDate(dir){
  const v = document.getElementById('view-sel').value;
  if(v==='month') currentViewDate.setMonth(currentViewDate.getMonth()+dir);
  else if(v==='week') currentViewDate.setDate(currentViewDate.getDate()+(dir*7));
  else currentViewDate.setDate(currentViewDate.getDate()+dir);
  renderAg();
}

function renderAg(){
  const v = document.getElementById('view-sel').value;
  const cont = document.getElementById('ag-cont');
  const label = document.getElementById('ag-label');
  
  if(v==='month') renderMonth(cont, label);
  else if(v==='week') renderWeek(cont, label);
  else renderDay(cont, label);
}

function renderMonth(cont, label){
  const y = currentViewDate.getFullYear(), m = currentViewDate.getMonth();
  label.innerText = new Intl.DateTimeFormat('fr-FR',{month:'long',year:'numeric'}).format(currentViewDate);
  
  const first = new Date(y, m, 1).getDay();
  const startShift = (first === 0 ? 6 : first - 1);
  const daysInM = new Date(y, m+1, 0).getDate();
  
  let html = `<div class="mg">`;
  const days = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  days.forEach(d => html += `<div style="text-align:center;font-size:9px;font-weight:800;color:var(--tx3);padding-bottom:5px;">${d}</div>`);
  
  // Jours mois précédent
  for(let i=0; i<startShift; i++) html += `<div class="md other"></div>`;
  
  // Jours actuels
  const todayStr = new Date().toISOString().slice(0,10);
  for(let d=1; d<=daysInM; d++){
    const date = new Date(y, m, d);
    const iso = date.toISOString().slice(0,10);
    const tasks = S.tasks.filter(t => t.due === iso);
    const gEvs = gcal.filter(e => e.start.slice(0,10) === iso);
    
    html += `
      <div class="md ${iso===todayStr?'today':''}" 
           ondragover="event.preventDefault();this.classList.add('drag-over-zone')" 
           ondragleave="this.classList.remove('drag-over-zone')"
           ondrop="this.classList.remove('drag-over-zone'); onTaskDrop(event, '${iso}')"
           onclick="viewDay('${iso}')">
        <div class="mn">${d}</div>
        <div class="mds">
          ${tasks.map(t=>`<div class="mev" style="background:var(--or)"></div>`).join('')}
          ${gEvs.map(e=>`<div class="mev" style="background:var(--bl)"></div>`).join('')}
        </div>
      </div>`;
  }
  cont.innerHTML = html + `</div>`;
}

function renderWeek(cont, label){
  const start = new Date(currentViewDate);
  const day = start.getDay();
  start.setDate(start.getDate() - (day === 0 ? 6 : day - 1));
  
  label.innerText = "Sem. du " + start.toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
  
  let html = `<div class="wg"><div class="wh"></div>`;
  for(let i=0; i<7; i++){
    const d = new Date(start); d.setDate(d.getDate()+i);
    html += `<div class="wh">${d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric'})}</div>`;
  }
  
  for(let h=8; h<20; h++){
    html += `<div class="wh">${h}h</div>`;
    for(let d=0; d<7; d++){
      const cur = new Date(start); cur.setDate(cur.getDate()+d);
      const iso = cur.toISOString().slice(0,10);
      html += `<div class="wsl" 
                   ondragover="event.preventDefault();this.classList.add('drag-over-zone')" 
                   ondragleave="this.classList.remove('drag-over-zone')"
                   ondrop="this.classList.remove('drag-over-zone'); onTaskDrop(event, '${iso}')"></div>`;
    }
  }
  cont.innerHTML = html + `</div>`;
}

function renderDay(cont, label){
  const iso = currentViewDate.toISOString().slice(0,10);
  label.innerText = currentViewDate.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'});
  
  let html = `<div class="dg">`;
  for(let h=0; h<24; h++){
    html += `<div class="dh">${h}h</div>
             <div class="day-sl" 
                  ondragover="event.preventDefault();this.classList.add('drag-over-zone')" 
                  ondragleave="this.classList.remove('drag-over-zone')"
                  ondrop="this.classList.remove('drag-over-zone'); onTaskDrop(event, '${iso}')"></div>`;
  }
  cont.innerHTML = html + `</div>`;
}

function viewDay(iso){
  currentViewDate = new Date(iso);
  document.getElementById('view-sel').value = 'day';
  renderAg();
}

/* MODAL EDITION */
function openTaskEdit(id){
  _editTaskId = id;
  const t = S.tasks.find(x=>x.id===id);
  document.getElementById('modal-title').innerText = t ? "Modifier la tâche" : "Nouvelle tâche";
  document.getElementById('te-title').value = t ? t.title : "";
  document.getElementById('te-due').value = t ? t.due : "";
  document.getElementById('te-desc').value = t ? t.desc : "";
  document.getElementById('te-remind').value = t ? t.remind : "0";
  document.getElementById('te-recur').value = t ? (t.recurrence||"") : "";
  document.getElementById('btn-del-task').style.display = t ? "block" : "none";
  document.getElementById('task-modal').style.display = "flex";
}

function closeTaskEdit(){ document.getElementById('task-modal').style.display = "none"; }

function saveTaskEdit(){
  const title = document.getElementById('te-title').value.trim();
  if(!title) return;
  
  if(_editTaskId){
    const t = S.tasks.find(x=>x.id===_editTaskId);
    t.title = title;
    t.due = document.getElementById('te-due').value || null;
    t.desc = document.getElementById('te-desc').value;
    t.remind = parseInt(document.getElementById('te-remind').value);
    t.recurrence = document.getElementById('te-recur').value || null;
  } else {
    S.tasks.push({
      id: Date.now().toString(),
      title,
      due: document.getElementById('te-due').value || null,
      desc: document.getElementById('te-desc').value,
      remind: parseInt(document.getElementById('te-remind').value),
      recurrence: document.getElementById('te-recur').value || null,
      done: false
    });
  }
  lsSave();
  closeTaskEdit();
  renderTasks();
  renderAg();
}

function toggleTaskDone(id){
  const idx = S.tasks.findIndex(x=>x.id===id);
  if(idx>-1) S.tasks.splice(idx,1);
  lsSave();
  renderTasks();
  renderAg();
}

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap">
<style>
:root{
  --bl:#2a7de1;--bld:#1a56a0;--blbg:#f0f6ff;--bll:#ddeeff;--blb:#c5d8f0;
  --or:#f5a623;--orbg:#fff8e6;
  --gr:#1e8a3c;--grbg:#e6f4ea;--grb:#34a853;
  --rd:#d93025;--tx:#1a2a4a;--tx2:#4a6080;--tx3:#8aaac8;
  --sh:0 2px 12px rgba(26,86,160,.10);
  --rad:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--blbg);color:var(--tx);min-height:100vh;overscroll-behavior:none;}
header{background:linear-gradient(135deg,#1a56a0,#2a7de1);height:56px;display:flex;align-items:center;padding:0 16px;gap:10px;box-shadow:0 2px 12px rgba(0,0,0,.20);position:sticky;top:0;z-index:200;}
header h1{flex:1;font-size:17px;font-weight:800;color:#fff;}
nav{background:#fff;border-bottom:2px solid var(--blb);display:flex;position:sticky;top:56px;z-index:199;}
.tab{flex:1;padding:12px 0;font-family:inherit;font-weight:800;font-size:13px;border:none;background:transparent;color:var(--tx2);cursor:pointer;border-bottom:3px solid transparent;}
.tab.active{color:var(--bl);border-bottom-color:var(--bl);}
.panel{display:none;padding:14px;max-width:900px;margin:0 auto;}.panel.active{display:block;}
.card{background:#fff;border:1.5px solid var(--blb);border-radius:var(--rad);padding:14px;margin-bottom:12px;box-shadow:var(--sh);}
.ct{font-weight:800;font-size:11px;color:var(--bld);margin-bottom:12px;text-transform:uppercase;}

/* Drag & Drop Styles */
.ta-btn.drag-handle { cursor: grab; touch-action: none; }
.ta-btn.drag-handle.active-drag { color: var(--or); transform: scale(1.2); }
.drag-ov { background-color: var(--orbg) !important; border: 2px dashed var(--or) !important; transform: scale(1.02); transition: all 0.2s; }
.ghost { position: fixed; z-index: 999; pointer-events: none; background: var(--or); color: #fff; padding: 8px 15px; border-radius: 10px; font-weight: 700; font-size: 13px; display: none; }

/* Calendar Grids */
.mg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.md{background:#fff;border:1.5px solid var(--blb);border-radius:9px;height:72px;padding:5px;cursor:pointer;display:flex;flex-direction:column;}
.wsl, .day-sl { background:#fff; border:1px solid var(--blb); position:relative; min-height:48px; }

/* ... (Reste des styles simplifiés pour la démo) ... */
.ti{background:#fff;border:1.5px solid var(--blb);border-radius:12px;padding:11px 13px;margin-bottom:8px;}
.ti-top{display:flex;align-items:center;gap:10px;}
.ta-btn{width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:8px;border:none;background:none;color:var(--tx3);}
</style>
</head>
<body>

<header><h1>Planify</h1></header>

<nav>
  <button class="tab active" onclick="showPanel('tasks')">Tâches</button>
  <button class="tab" id="tab-ag" onclick="showPanel('ag')">Calendrier</button>
</nav>

<div id="p-tasks" class="panel active">
  <div class="ct">Tâches en attente</div>
  <div id="task-list" class="tl"></div>
</div>

<div id="p-ag" class="panel">
  <div class="card">
    <div id="calendar-view"></div>
  </div>
</div>

<div id="toast" class="toast">Action réussie</div>
<div id="drag-ghost" class="ghost"></div>

<script>
// DONNÉES ET ÉTAT
let S = {
  tasks: [
    {id: '1', title: 'Acheter du pain', due: null, desc: ''},
    {id: '2', title: 'Rendez-vous dentiste', due: '2026-04-20', desc: 'Secteur 4'},
    {id: '3', title: 'Réparer le vélo', due: null, desc: ''}
  ]
};

let longPressTimer;
let currentDragTaskId = null;

// GESTION DES ONGLETS
function showPanel(id) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('p-' + id).classList.add('active');
  event?.target?.classList?.add('active');
  if(id === 'tasks') renderTasks();
  if(id === 'ag') renderCalendar();
}

// LOGIQUE DRAG & DROP
function initLongPress(el, taskId) {
  const start = (e) => {
    longPressTimer = setTimeout(() => {
      currentDragTaskId = taskId;
      el.setAttribute('draggable', 'true');
      el.classList.add('active-drag');
      // Vibration si disponible
      if (navigator.vibrate) navigator.vibrate(50);
    }, 500);
  };

  const clear = () => {
    clearTimeout(longPressTimer);
  };

  el.addEventListener('mousedown', start);
  el.addEventListener('touchstart', start, {passive: true});
  el.addEventListener('mouseup', clear);
  el.addEventListener('touchend', clear);
  el.addEventListener('touchmove', clear);
}

function handleDragStart(e, taskId) {
  e.dataTransfer.setData("text/plain", taskId);
  e.dataTransfer.effectAllowed = "move";
  
  // Créer le ghost
  const task = S.tasks.find(t => t.id === taskId);
  const ghost = document.getElementById('drag-ghost');
  ghost.textContent = task.title;
  ghost.style.display = 'block';
  e.dataTransfer.setDragImage(ghost, 0, 0);
  
  // Petit hack : changer d'onglet si on survole le bouton calendrier
  document.getElementById('tab-ag').ondragover = () => showPanel('ag');
}

async function handleDrop(e, dateISO) {
  e.preventDefault();
  const taskId = e.dataTransfer.getData("text/plain");
  const task = S.tasks.find(t => t.id === taskId);
  
  if (task) {
    task.due = dateISO;
    showToast(`Tâche déplacée au ${dateISO}`);
    // Ici vous appelleriez lsSave() ou votre sync GCal
    renderCalendar();
  }
}

// RENDU DES COMPOSANTS
function renderTasks() {
  const cont = document.getElementById('task-list');
  cont.innerHTML = S.tasks.filter(t => !t.due).map(t => `
    <div class="ti">
      <div class="ti-top">
        <div class="ta-btn drag-handle" 
             onmousedown="initLongPress(this, '${t.id}')" 
             ontouchstart="initLongPress(this, '${t.id}')"
             ondragstart="handleDragStart(event, '${t.id}')">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18c0 1.1-.9 2-2 2s-2-.9-2-2 .9-2 2-2 2 .9 2 2zm-2-8c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0-6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm6 4c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>
        <div class="tn">${t.title}</div>
      </div>
    </div>
  `).join('');
}

function renderCalendar() {
  const cont = document.getElementById('calendar-view');
  // Exemple simplifié de grille mensuelle (7 jours)
  let html = `<div class="mg">`;
  for(let i=20; i<=26; i++) {
    const date = `2026-04-${i}`;
    const tasksForDay = S.tasks.filter(t => t.due === date);
    html += `
      <div class="md" 
           ondragover="event.preventDefault(); this.classList.add('drag-ov')" 
           ondragleave="this.classList.remove('drag-ov')"
           ondrop="this.classList.remove('drag-ov'); handleDrop(event, '${date}')">
        <div class="mn">${i} avr.</div>
        <div class="mds">
          ${tasksForDay.map(t => `<div style="font-size:9px; background:var(--bl); color:#fff; border-radius:3px; padding:1px 3px; margin-bottom:2px;">${t.title}</div>`).join('')}
        </div>
      </div>`;
  }
  html += `</div>`;
  cont.innerHTML = html;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

// Init
renderTasks();
</script>
</body>
</html>

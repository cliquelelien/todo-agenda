<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap">
<style>
/* PWA manifest inline via JS */
:root{
  --bl:#2a7de1;--bld:#1a56a0;--blbg:#f0f6ff;--bll:#ddeeff;--blb:#c5d8f0;
  --or:#f5a623;--orbg:#fff8e6;
  --gr:#1e8a3c;--grbg:#e6f4ea;--grb:#34a853;
  --rd:#d93025;--tx:#1a2a4a;--tx2:#4a6080;--tx3:#8aaac8;
  --sh:0 2px 8px rgba(26,86,160,.10);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--blbg);color:var(--tx);min-height:100vh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;}

header{background:linear-gradient(135deg,#1a56a0,#2a7de1);height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.18);position:sticky;top:0;z-index:200;}
header h1{flex:1;font-size:17px;font-weight:800;color:#fff;}
#gs{font-size:11px;font-weight:700;color:rgba(255,255,255,.7);}#gs.ok{color:#a8f5c8;}
#bg{display:flex;align-items:center;gap:5px;background:#fff;border:none;border-radius:8px;padding:5px 10px;font-family:inherit;font-weight:800;font-size:11px;color:var(--bld);cursor:pointer;white-space:nowrap;}
#bg img{width:14px;height:14px;}

nav{background:#fff;border-bottom:2px solid var(--blb);display:flex;position:sticky;top:52px;z-index:199;}
.tab{flex:1;padding:11px 0;font-family:inherit;font-weight:800;font-size:13px;border:none;background:transparent;color:var(--tx2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;text-align:center;}
.tab.active{color:var(--bl);border-bottom-color:var(--bl);}

.panel{display:none;padding:12px;max-width:900px;margin:0 auto;}.panel.active{display:block;}
.card{background:#fff;border:1.5px solid var(--blb);border-radius:14px;padding:13px;margin-bottom:11px;box-shadow:var(--sh);}
.ct{font-weight:800;font-size:12px;color:var(--bld);margin-bottom:11px;text-transform:uppercase;letter-spacing:.06em;}

/* Form */
.ar{display:flex;gap:7px;flex-wrap:wrap;}
.ar input[type=text]{flex:1;min-width:130px;font-family:inherit;font-size:14px;font-weight:700;color:var(--tx);background:var(--blbg);border:1.5px solid var(--blb);border-radius:10px;padding:8px 12px;outline:none;}
.ar input[type=text]:focus{border-color:var(--bl);}
.ar input::placeholder{color:var(--tx3);}
.ar input[type=date]{font-family:inherit;font-size:13px;font-weight:700;color:var(--tx);background:var(--blbg);border:1.5px solid var(--blb);border-radius:10px;padding:8px 9px;outline:none;color-scheme:light;}
.btn{font-family:inherit;font-weight:800;font-size:13px;border:none;border-radius:10px;padding:8px 15px;cursor:pointer;white-space:nowrap;}
.btn-bl{background:var(--bl);color:#fff;}.btn-gh{background:transparent;border:1.5px solid var(--blb);color:var(--tx2);}

/* Tasks */
.tl{display:flex;flex-direction:column;gap:6px;margin-top:3px;}
.ti{background:#fff;border:1.5px solid var(--blb);border-radius:11px;padding:10px 12px;display:flex;align-items:center;gap:9px;cursor:grab;user-select:none;transition:border-color .15s,opacity .15s;}
.ti:hover{border-color:var(--bl);}
.ti.dragging{opacity:.35;border-color:var(--or);}
.ti.done{background:#f8fbff;opacity:.7;}
.ck{width:21px;height:21px;flex-shrink:0;border:2px solid var(--blb);border-radius:6px;cursor:pointer;background:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.ck.on{background:var(--or);border-color:var(--or);}
.ck svg{display:none;}.ck.on svg{display:block;}
.tb{flex:1;min-width:0;}
.tn{font-size:14px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ti.done .tn{text-decoration:line-through;color:var(--tx3);}
.tgs{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;}
.tg{font-size:10px;font-weight:800;border-radius:5px;padding:1px 6px;}
.tg-d{background:#fff0e6;color:#c0622b;border:1px solid #f5a06a;}
.tg-d.ov{background:#fdecea;color:var(--rd);border-color:var(--rd);}
.tg-p{background:var(--orbg);color:var(--or);border:1px solid var(--or);}
.tg-g{background:var(--grbg);color:var(--gr);border:1px solid var(--grb);}
.td-btn{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:20px;line-height:1;padding:0 2px;flex-shrink:0;}
.td-btn:hover{color:var(--rd);}
.dh{text-align:center;font-size:12px;font-weight:700;color:var(--tx3);padding:9px 0 2px;}
.emp{text-align:center;font-size:13px;font-weight:700;color:var(--tx3);padding:14px 0;}

/* Agenda toolbar */
.agt{display:flex;align-items:center;gap:6px;margin-bottom:11px;flex-wrap:wrap;}
.agn{display:flex;align-items:center;gap:4px;}
.agn button{background:var(--blbg);border:1.5px solid var(--blb);border-radius:8px;color:var(--bl);width:30px;height:30px;cursor:pointer;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.agn button:hover{background:var(--bll);}
.agp{font-weight:800;font-size:14px;color:var(--bld);min-width:110px;text-align:center;}
.hr-sel{display:none;align-items:center;gap:5px;font-size:12px;font-weight:700;color:var(--tx3);}
.hr-sel.show{display:flex;}
.hr-sel select{font-family:inherit;font-size:11px;font-weight:700;color:var(--tx);background:var(--blbg);border:1.5px solid var(--blb);border-radius:7px;padding:3px 6px;outline:none;}
.vsw{display:flex;gap:3px;margin-left:auto;}
.vb{padding:5px 11px;border:1.5px solid var(--blb);background:#fff;border-radius:8px;font-family:inherit;font-weight:800;font-size:12px;color:var(--tx2);cursor:pointer;}
.vb.active{background:var(--bl);border-color:var(--bl);color:#fff;}

/* Month */
.mg{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;position:relative;}
.mh{text-align:center;font-size:10px;font-weight:800;color:var(--tx3);padding:4px 0;text-transform:uppercase;letter-spacing:.06em;}
.md{background:#fff;border:1.5px solid var(--blb);border-radius:8px;height:70px;overflow:hidden;padding:4px;cursor:pointer;display:flex;flex-direction:column;transition:border-color .2s,background .2s;}
.md:hover{border-color:var(--bl);background:var(--blbg);}
.md.oth{opacity:.2;pointer-events:none;}
.md.tdy{border-color:var(--bl);background:var(--bll);}
.md.sel{border-color:var(--or)!important;background:var(--orbg)!important;}
.md.drag-ov{border-color:var(--or)!important;background:var(--orbg)!important;}
.mn{font-size:12px;font-weight:800;color:var(--tx2);flex-shrink:0;}
.md.tdy .mn{color:var(--bl);}.md.sel .mn{color:var(--or);}
.mds{display:flex;flex-direction:column;gap:2px;overflow:hidden;flex:1;margin-top:2px;}
/* dot base */
.dot{height:13px;flex-shrink:0;border-radius:4px;font-size:9px;font-weight:700;color:#fff;padding:0 4px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;}
.dot-td{background:var(--bl);}
.dot-dn{background:#6ec96e;}
.dot-gc{background:var(--gr);}
.dot-mo{background:var(--tx3);}

/* Edge zones */
.edge-zone{position:absolute;top:0;bottom:0;width:44px;z-index:10;pointer-events:none;opacity:0;transition:opacity .2s;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--or);border-radius:8px;}
.edge-zone.left{left:0;background:linear-gradient(to right,rgba(245,166,35,.25),transparent);}
.edge-zone.right{right:0;background:linear-gradient(to left,rgba(245,166,35,.25),transparent);}
.edge-zone.lit{opacity:1;}

/* Week */
.ww{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.wg{min-width:460px;}
.whr{display:grid;grid-template-columns:36px repeat(7,1fr);gap:2px;margin-bottom:1px;}
.whd{background:#fff;border:1.5px solid var(--blb);border-radius:8px 8px 0 0;padding:5px 3px;text-align:center;cursor:pointer;}
.whd:hover{background:var(--blbg);}
.whd.tdy{background:var(--bll);border-color:var(--bl);}
.whd.sel{background:var(--orbg)!important;border-color:var(--or)!important;}
.wdn{font-size:10px;font-weight:800;color:var(--tx3);text-transform:uppercase;}
.wnum{font-size:16px;font-weight:800;color:var(--tx2);}
.whd.tdy .wnum{color:var(--bl);}.whd.sel .wnum{color:var(--or);}
.war{display:grid;grid-template-columns:36px repeat(7,1fr);gap:2px;margin-bottom:1px;}
.wal{font-size:9px;font-weight:800;color:var(--tx3);display:flex;align-items:center;justify-content:flex-end;padding-right:3px;}
.wac{background:#fff;border:1px solid var(--blb);min-height:18px;padding:2px 3px;overflow:hidden;}
.wac.drag-ov{background:var(--orbg)!important;border-color:var(--or)!important;}
.wch{border-radius:4px;font-size:9px;font-weight:700;color:#fff;padding:1px 4px;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;}
.wch-td{background:var(--bl);}.wch-dn{background:#6ec96e;}.wch-gc{background:var(--gr);}
.wtr{display:grid;grid-template-columns:36px repeat(7,1fr);gap:2px;}
.wtl{font-size:10px;font-weight:700;color:var(--tx3);text-align:right;padding-right:4px;height:44px;display:flex;align-items:flex-start;padding-top:2px;}
.wsl{height:44px;background:#fff;border:1px solid var(--blb);border-top:none;position:relative;overflow:hidden;}
.wsl.drag-ov{background:var(--orbg)!important;}
.wev{position:absolute;left:1px;right:1px;top:2px;border-radius:4px;font-size:9px;font-weight:700;color:#fff;padding:1px 3px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.wev-td{background:var(--bl);}.wev-dn{background:#6ec96e;}.wev-gc{background:var(--gr);}

/* Day */
.day-allday{background:#fff;border:1.5px solid var(--blb);border-radius:10px;padding:9px 11px;margin-bottom:9px;}
.day-allday-t{font-size:11px;font-weight:800;color:var(--tx3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.day-dz{border:2px dashed var(--blb);border-radius:10px;padding:11px;text-align:center;font-size:12px;font-weight:700;color:var(--tx3);margin-bottom:9px;transition:all .15s;}
.day-dz.drag-ov{border-color:var(--or);background:var(--orbg);color:var(--or);}
.day-grid{display:grid;grid-template-columns:36px 1fr;}
.day-lbl{font-size:10px;font-weight:700;color:var(--tx3);text-align:right;padding-right:7px;height:46px;display:flex;align-items:flex-start;padding-top:2px;}
.day-sl{height:46px;background:#fff;border:1px solid var(--blb);border-top:none;position:relative;transition:background .12s;}
.day-sl.first{border-top:1px solid var(--blb);}
.day-sl.drag-ov{background:var(--orbg)!important;}
.day-ev{position:absolute;left:3px;right:3px;top:2px;border-radius:6px;font-size:11px;font-weight:700;color:#fff;padding:2px 7px;overflow:hidden;}
.day-ev-td{background:var(--bl);}.day-ev-dn{background:#6ec96e;}.day-ev-gc{background:var(--gr);}

/* Detail */
.det{background:#fff;border:1.5px solid var(--blb);border-radius:14px;padding:13px;margin-top:11px;box-shadow:var(--sh);}
.det-t{font-weight:800;font-size:14px;color:var(--bld);margin-bottom:9px;}
.det-row{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--blbg);}
.det-row:last-child{border-bottom:none;}
.det-n{flex:1;font-size:13px;font-weight:700;}
.det-row.done .det-n{text-decoration:line-through;color:var(--tx3);}
.det-time{font-size:11px;font-weight:700;color:var(--tx3);white-space:nowrap;}
.det-del{background:none;border:none;cursor:pointer;color:var(--tx3);font-size:18px;padding:0 2px;}
.det-del:hover{color:var(--rd);}
.gcal-row{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid var(--blbg);}
.gcal-row:last-child{border-bottom:none;}
.gcal-dot{width:9px;height:9px;border-radius:50%;background:var(--gr);flex-shrink:0;}
.gcal-n{flex:1;font-size:13px;font-weight:700;color:var(--tx);}
.gcal-t{font-size:11px;font-weight:700;color:var(--tx3);}

/* Modal */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:500;align-items:center;justify-content:center;padding:16px;}
.ov.open{display:flex;}
.mo{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:310px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.mo h3{font-size:15px;font-weight:800;color:var(--bld);margin-bottom:12px;}
.mo-task{font-size:14px;font-weight:700;color:var(--tx);background:var(--blbg);border-radius:8px;padding:8px 11px;margin-bottom:12px;}
.mo label{font-size:12px;font-weight:800;color:var(--tx2);display:block;margin-bottom:3px;}
.mo input{width:100%;font-family:inherit;font-size:14px;font-weight:700;color:var(--tx);background:var(--blbg);border:1.5px solid var(--blb);border-radius:10px;padding:8px 11px;outline:none;margin-bottom:9px;}
.mo-btns{display:flex;gap:7px;margin-top:4px;}
.mo-btns button{flex:1;}
.mo-skip{font-size:12px;font-weight:700;color:var(--tx3);text-align:center;margin-top:9px;cursor:pointer;text-decoration:underline;}

/* Ghost + toast + sync */
.ghost{position:fixed;z-index:999;pointer-events:none;background:var(--orbg);border:2px solid var(--or);border-radius:10px;padding:7px 12px;font-size:13px;font-weight:700;color:var(--tx);box-shadow:0 6px 20px rgba(245,166,35,.35);max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:none;transform:rotate(-2deg);font-family:inherit;}
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bld);color:#fff;border-radius:30px;padding:8px 17px;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.sync{display:none;align-items:center;gap:7px;padding:7px 11px;background:var(--grbg);border:1.5px solid var(--grb);border-radius:10px;margin-bottom:9px;font-size:12px;font-weight:700;color:#1a6630;}
.sync.show{display:flex;}
.spinner{width:13px;height:13px;border:2px solid #ccc;border-top-color:var(--gr);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<header>
  <span style="font-size:19px">📋</span>
  <h1>Planning</h1>
  <span id="gs">Non connecté</span>
  <button id="bg" onclick="handleAuth()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
    Connexion Google
  </button>
</header>
<nav>
  <button class="tab active" onclick="goTab('todo')">✅ Tâches</button>
  <button class="tab" onclick="goTab('agenda')">📅 Agenda</button>
</nav>

<!-- TÂCHES -->
<div class="panel active" id="panel-todo">
  <div class="card">
    <div class="ct">✏️ Nouvelle tâche</div>
    <div class="ar">
      <input type="text" id="ti" placeholder="Titre de la tâche…" maxlength="100">
      <input type="date" id="tdat">
      <button class="btn btn-bl" onclick="addTask()">+ Ajouter</button>
    </div>
  </div>
  <div class="card">
    <div class="ct">📌 À faire</div>
    <div class="tl" id="list-todo"></div>
    <div class="dh" id="dh" style="display:none">📅 Cliquez sur 📅 pour planifier — ou allez dans l’Agenda pour glisser-déposer une tâche</div>
  </div>
  <div class="card" id="card-done" style="display:none">
    <div class="ct">✅ Terminées</div>
    <div class="tl" id="list-done"></div>
  </div>
</div>

<!-- AGENDA -->
<div class="panel" id="panel-agenda">
  <div id="sync-bar" class="sync"><div class="spinner"></div><span id="sync-msg"></span></div>
  <div class="card">
    <div class="agt">
      <div class="agn">
        <button onclick="navPrev()">‹</button>
        <div class="agp" id="agp"></div>
        <button onclick="navNext()">›</button>
      </div>
      <div class="hr-sel" id="hr-sel">
        <span>De</span><select id="h-start" onchange="renderAg()"></select>
        <span>à</span><select id="h-end" onchange="renderAg()"></select>
      </div>
      <div class="vsw">
        <button class="vb active" id="vb-month" onclick="setView('month')">Mois</button>
        <button class="vb" id="vb-week" onclick="setView('week')">Semaine</button>
        <button class="vb" id="vb-day" onclick="setView('day')">Jour</button>
      </div>
    </div>
    <div id="ag-body"></div>
  </div>
  <div class="det" id="detail" style="display:none"></div>
</div>

/* ── Migrate old data from any previous key ── */
const LS_KEY="planning_app";
function lsLoad(){
  // try current key first, then migrate from old keys
  const keys=["planning_app","planning_v2","planning_v1","ta_v4","todoagenda_sc_v2","todoagenda_v3","todoagenda_sc_v1","ta_v1"];
  for(const k of keys){
    try{
      const raw=localStorage.getItem(k);
      if(!raw) continue;
      const data=JSON.parse(raw);
      if(data && Array.isArray(data.tasks) && data.tasks.length>0){
        if(k!==LS_KEY) localStorage.setItem(LS_KEY, raw); // migrate
        return data;
      }
    }catch(e){}
  }
  return {tasks:[]};
}

/* ══════ UTILS ══════ */
function ds(d){return d.getFullYear()+"-"+z(d.getMonth()+1)+"-"+z(d.getDate());}
function z(n){return String(n).padStart(2,"0");}
function monday(d){const x=new Date(d);const w=x.getDay()||7;x.setDate(x.getDate()-w+1);x.setHours(0,0,0,0);return x;}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fD(s){if(!s)return"";return new Date(s+"T00:00:00").toLocaleDateString("fr-FR",{day:"numeric",month:"short"});}
function fT(iso){if(!iso||!iso.includes("T"))return"";return iso.split("T")[1].slice(0,5);}
function hS(){return parseInt(document.getElementById("h-start").value);}
function hE(){return parseInt(document.getElementById("h-end").value);}
function todosOn(d){return S.tasks.filter(t=>t.plannedDate===d||(t.due===d&&!t.plannedDate));}
function gcalOn(d){return gcal.filter(e=>e.start.slice(0,10)===d);}
function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),2500);}
function showSync(m){const b=document.getElementById("sync-bar");b.className="sync show";document.getElementById("sync-msg").textContent=m;}
function hideSync(){document.getElementById("sync-bar").className="sync";}

})();

function onGisLoad(){tc=google.accounts.oauth2.initTokenClient({client_id:CLIENT_ID,scope:SCOPES,callback:async r=>{if(r.error){toast("❌ Connexion annulée");return;}token=r.access_token;gapi.client.setToken({access_token:token});localStorage.setItem("gt",token);await onConnected();}});gisOk=true;tryRestore();}
function tryRestore(){if(!gapiOk||!gisOk)return;const t=localStorage.getItem("gt");if(t){token=t;gapi.client.setToken({access_token:t});onConnected();}}
function handleAuth(){if(token){doLogout();return;}if(!tc){toast("Chargement…");return;}tc.requestAccessToken({prompt:""});}
function doLogout(){google.accounts.oauth2.revoke(token,()=>{});token=null;gcal=[];localStorage.removeItem("gt");document.getElementById("gs").textContent="Non connecté";document.getElementById("gs").className="";document.getElementById("bg").innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:14px;height:14px" alt="G"> Connexion Google';toast("Déconnecté");renderTasks();if(curTab==="agenda")renderAg();}
async function onConnected(){document.getElementById("gs").textContent="✓ Connecté";document.getElementById("gs").className="ok";document.getElementById("bg").innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:14px;height:14px" alt="G"> Déconnecter';toast("✓ Google connecté !");await loadDrive();await fetchGcal();renderTasks();if(curTab==="agenda")renderAg();}

/* ══════ DRIVE ══════ */
async function findDF(){const r=await gapi.client.request({path:"https://www.googleapis.com/drive/v3/files",params:{spaces:"appDataFolder",q:`name='${DRIVE_FILE}'`,fields:"files(id)"}});return(r.result.files||[])[0]?.id||null;}
async function loadDrive(){try{showSync("Chargement Drive…");driveFileId=await findDF();if(!driveFileId){hideSync();return;}const r=await gapi.client.request({path:`https://www.googleapis.com/drive/v3/files/${driveFileId}`,params:{alt:"media"}});const data=typeof r.result==="string"?JSON.parse(r.result):r.result;if(data?.tasks&&data.tasks.length>0){S=data;lsSave();}hideSync();toast("📂 Drive chargé");}catch(e){hideSync();}}
async function saveDrive(){if(!token)return;try{if(!driveFileId){const m=await gapi.client.request({path:"https://www.googleapis.com/drive/v3/files",method:"POST",body:JSON.stringify({name:DRIVE_FILE,parents:["appDataFolder"]}),headers:{"Content-Type":"application/json"}});driveFileId=m.result.id;}await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{method:"PATCH",headers:{Authorization:"Bearer "+token,"Content-Type":"application/json"},body:JSON.stringify(S)});}catch(e){}}

/* ══════ GCAL ══════ */
async function fetchGcal(){if(!token)return;showSync("Chargement Agenda…");try{const tMin=new Date();tMin.setMonth(tMin.getMonth()-2);const tMax=new Date();tMax.setMonth(tMax.getMonth()+4);const r=await gapi.client.calendar.events.list({calendarId:"primary",timeMin:tMin.toISOString(),timeMax:tMax.toISOString(),singleEvents:true,orderBy:"startTime",maxResults:500});gcal=(r.result.items||[]).map(e=>({id:e.id,title:e.summary||"(sans titre)",start:e.start.dateTime||e.start.date,end:e.end.dateTime||e.end.date,allDay:!e.start.dateTime}));hideSync();}catch(e){hideSync();if(e.status===401){token=null;localStorage.removeItem("gt");}}}
async function createGcalEv(task,date,tS,tE){if(!token)return null;try{const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;const r=await gapi.client.calendar.events.insert({calendarId:"primary",resource:{summary:task.title,start:tS?{dateTime:`${date}T${tS}:00`,timeZone:tz}:{date},end:tE?{dateTime:`${date}T${tE}:00`,timeZone:tz}:{date}}});return r.result.id;}catch(e){return null;}}
async function delGcalEv(id){if(!token||!id)return;try{await gapi.client.calendar.events.delete({calendarId:"primary",eventId:id});gcal=gcal.filter(e=>e.id!==id);}catch(e){}}

/* ══════ TABS ══════ */
function goTab(t){curTab=t;document.querySelectorAll(".tab").forEach((el,i)=>el.classList.toggle("active",(i===0&&t==="todo")||(i===1&&t==="agenda")));document.querySelectorAll(".panel").forEach(p=>p.classList.remove("active"));document.getElementById("panel-"+t).classList.add("active");if(t==="agenda"){renderAg();if(token)fetchGcal().then(renderAg);}}

/* ══════ VIEW ══════ */
function setView(v){view=v;["month","week","day"].forEach(x=>document.getElementById("vb-"+x).classList.toggle("active",x===v));document.getElementById("hr-sel").classList.toggle("show",v!=="month");renderAg();}
function navPrev(){if(view==="month"){cM--;if(cM<0){cM=11;cY--;}}else if(view==="week"){const d=new Date(cWeek);d.setDate(d.getDate()-7);cWeek=d;}else{const d=new Date(cDay+"T00:00:00");d.setDate(d.getDate()-1);cDay=ds(d);}renderAg();}
function navNext(){if(view==="month"){cM++;if(cM>11){cM=0;cY++;}}else if(view==="week"){const d=new Date(cWeek);d.setDate(d.getDate()+7);cWeek=d;}else{const d=new Date(cDay+"T00:00:00");d.setDate(d.getDate()+1);cDay=ds(d);}renderAg();}
function renderAg(){if(view==="month")renderMonth();else if(view==="week")renderWeek();else renderDay();}

const MO=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const DN=["Lu","Ma","Me","Je","Ve","Sa","Di"];

/* ══════ MONTH VIEW ══════ */
function renderMonth(){
  document.getElementById("agp").textContent=MO[cM]+" "+cY;
  const body=document.getElementById("ag-body");body.innerHTML="";

  /* Wrapper with position:relative for edge zones */
  const wrapper=mk("div");wrapper.style.position="relative";body.appendChild(wrapper);

  /* Edge indicator zones */
  const ezL=mk("div","edge-zone left");ezL.textContent="‹";wrapper.appendChild(ezL);
  const ezR=mk("div","edge-zone right");ezR.textContent="›";wrapper.appendChild(ezR);

  const g=mk("div","mg");wrapper.appendChild(g);
  DN.forEach(d=>{const h=mk("div","mh");h.textContent=d;g.appendChild(h);});

  const fd=(()=>{let d=new Date(cY,cM,1).getDay();return d===0?6:d-1;})();
  const dim=new Date(cY,cM+1,0).getDate();
  const pd=new Date(cY,cM,0).getDate();
  const today=ds(NOW);

  let cells=[];
  for(let i=fd-1;i>=0;i--)cells.push({d:pd-i,cur:false});
  for(let i=1;i<=dim;i++)cells.push({d:i,cur:true});
  while(cells.length%7!==0)cells.push({d:cells.length-dim-fd+1,cur:false});

  cells.forEach(c=>{
    const div=mk("div","md"+(c.cur?"":" oth"));
    if(!c.cur){div.innerHTML=`<div class="mn">${c.d}</div>`;g.appendChild(div);return;}
    const date=`${cY}-${z(cM+1)}-${z(c.d)}`;
    div.dataset.date=date;
    if(date===today)div.classList.add("tdy");
    if(date===selDay)div.classList.add("sel");

    /* All tasks on this date (with AND without time) */
    const todos=todosOn(date);
    const gcalEvs=gcalOn(date);
    div.innerHTML=`<div class="mn">${c.d}</div><div class="mds"></div>`;
    const mds=div.querySelector(".mds");
    let n=0;
    todos.slice(0,2).forEach(t=>{
      if(n>=2)return;
      const dot=mk("div","dot "+(t.done?"dot-dn":"dot-td"));
      dot.textContent=t.title;
      mds.appendChild(dot);n++;
    });
    gcalEvs.slice(0,2-n).forEach(e=>{
      const dot=mk("div","dot dot-gc");
      dot.textContent=e.title;
      mds.appendChild(dot);n++;
    });
    const tot=todos.length+gcalEvs.length;
    if(tot>2){const m=mk("div","dot dot-mo");m.textContent="+"+(tot-2)+" autre"+(tot-2>1?"s":"");mds.appendChild(m);}

    div.addEventListener("click",()=>{selDay=date;renderMonth();showDet(date);});

    /* Drag over month cell: start hold timer — only fires if stationary 0.8s */
    div.addEventListener("dragenter",e=>{
      e.preventDefault();
      div.classList.add("drag-ov");
      if(holdDate!==date){
        clearTimeout(holdTimer);holdDate=date;
        holdTimer=setTimeout(()=>{
          if(holdDate===date){cDay=date;selDay=date;setView("day");}
        },800);
      }
    });
    div.addEventListener("dragover",e=>{e.preventDefault();});
    div.addEventListener("dragleave",()=>{
      div.classList.remove("drag-ov");
      if(holdDate===date){clearTimeout(holdTimer);holdDate=null;}
    });
    div.addEventListener("drop",e=>{
      e.preventDefault();div.classList.remove("drag-ov");
      clearTimeout(holdTimer);holdDate=null;
      const tid=e.dataTransfer.getData("tid");if(!tid)return;
      openModal(tid,date,"09:00","10:00");
    });
    g.appendChild(div);
  });

  /* Edge scroll: 0.7s on left/right edge → prev/next month + visual indicator */
  wrapper.addEventListener("dragover",e=>{
    const rect=wrapper.getBoundingClientRect();
    const x=e.clientX-rect.left, w=rect.width;
    const onLeft=x<50, onRight=x>w-50;
    if(onLeft||onRight){
      const side=onLeft?"left":"right";
      if(side!==edgeSide){
        clearTimeout(edgeTimer);edgeSide=side;
        /* Flash edge zone immediately */
        ezL.classList.toggle("lit",onLeft);
        ezR.classList.toggle("lit",onRight);
        edgeTimer=setTimeout(()=>{
          edgeSide=null;edgeTimer=null;
          ezL.classList.remove("lit");ezR.classList.remove("lit");
          if(onLeft)navPrev();else navNext();
        },700);
      }
    } else {
      if(edgeSide){clearTimeout(edgeTimer);edgeSide=null;edgeTimer=null;ezL.classList.remove("lit");ezR.classList.remove("lit");}
    }
  });
  wrapper.addEventListener("dragleave",()=>{clearTimeout(edgeTimer);edgeSide=null;edgeTimer=null;ezL.classList.remove("lit");ezR.classList.remove("lit");});
  wrapper.addEventListener("drop",()=>{clearTimeout(edgeTimer);edgeSide=null;edgeTimer=null;ezL.classList.remove("lit");ezR.classList.remove("lit");});

  if(selDay)showDet(selDay);
}

/* ══════ WEEK VIEW ══════ */
function renderWeek(){
  const ws=new Date(cWeek);const we=new Date(ws);we.setDate(we.getDate()+6);
  const fmt=d=>d.toLocaleDateString("fr-FR",{day:"numeric",month:"short"});
  document.getElementById("agp").textContent=fmt(ws)+" – "+fmt(we);
  const body=document.getElementById("ag-body");body.innerHTML="";
  const today=ds(NOW);const hs=hS(),he=hE();
  const days=[];for(let i=0;i<7;i++){const d=new Date(ws);d.setDate(d.getDate()+i);days.push({date:ds(d),num:d.getDate(),lbl:DN[i]});}
  const wrap=mk("div","ww");body.appendChild(wrap);
  const grid=mk("div","wg");wrap.appendChild(grid);

  /* Header row */
  const hr=mk("div","whr");grid.appendChild(hr);hr.appendChild(mk("div"));
  days.forEach(day=>{
    const col=mk("div","whd");
    if(day.date===today)col.classList.add("tdy");
    if(day.date===selDay)col.classList.add("sel");
    col.innerHTML=`<div class="wdn">${day.lbl}</div><div class="wnum">${day.num}</div>`;
    col.addEventListener("click",()=>{selDay=day.date;cDay=day.date;setView("day");});
    hr.appendChild(col);
  });

  /* All-day row — only tasks WITHOUT time */
  const ar=mk("div","war");grid.appendChild(ar);
  const al=mk("div","wal");al.textContent="Jour";ar.appendChild(al);
  days.forEach(day=>{
    const cell=mk("div","wac");cell.dataset.date=day.date;
    todosOn(day.date).filter(t=>!t.timeStart).slice(0,3).forEach(t=>{
      const c=mk("div","wch "+(t.done?"wch-dn":"wch-td"));c.textContent=t.title;cell.appendChild(c);
    });
    gcalOn(day.date).filter(e=>e.allDay).slice(0,2).forEach(e=>{
      const c=mk("div","wch wch-gc");c.textContent=e.title;cell.appendChild(c);
    });
    bindDrop(cell,day.date,false);ar.appendChild(cell);
  });

  /* Time rows — fixed height, only tasks WITH time */
  const tr=mk("div","wtr");grid.appendChild(tr);
  for(let h=hs;h<he;h++){
    const lbl=mk("div","wtl");lbl.textContent=h+"h";tr.appendChild(lbl);
    days.forEach(day=>{
      const slot=mk("div","wsl");slot.dataset.date=day.date;slot.dataset.hour=h;
      bindDrop(slot,day.date,true,h);
      todosOn(day.date).filter(t=>t.timeStart&&parseInt(t.timeStart.split(":")[0])===h).forEach((t,i)=>{
        const e=mk("div","wev "+(t.done?"wev-dn":"wev-td"));
        e.textContent=(t.timeStart||"")+" "+t.title;e.style.top=(i*20+2)+"px";slot.appendChild(e);
      });
      gcalOn(day.date).filter(e=>!e.allDay&&e.start.includes("T")&&parseInt(e.start.split("T")[1].split(":")[0])===h).forEach((e,i)=>{
        const ev=mk("div","wev wev-gc");ev.textContent=fT(e.start)+" "+e.title;
        const off=todosOn(day.date).filter(t=>t.timeStart&&parseInt(t.timeStart.split(":")[0])===h).length;
        ev.style.top=((off+i)*20+2)+"px";slot.appendChild(ev);
      });
      tr.appendChild(slot);
    });
  }
  if(selDay)showDet(selDay);
}

/* ══════ DAY VIEW ══════ */
function renderDay(){
  const d=new Date(cDay+"T00:00:00");
  const lbl=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.getElementById("agp").textContent=lbl.charAt(0).toUpperCase()+lbl.slice(1);
  const body=document.getElementById("ag-body");body.innerHTML="";
  const hs=hS(),he=hE();
  const alT=todosOn(cDay).filter(t=>!t.timeStart);
  const alG=gcalOn(cDay).filter(e=>e.allDay);
  if(alT.length||alG.length){
    const sec=mk("div","day-allday");body.appendChild(sec);
    const tit=mk("div","day-allday-t");tit.textContent="Journée entière";sec.appendChild(tit);
    alT.forEach(t=>sec.appendChild(buildDetRow(t)));
    alG.forEach(e=>sec.appendChild(buildGcalRow(e)));
  }
  const dz=mk("div","day-dz");dz.textContent="+ Glisser ici → journée entière";
  dz.dataset.date=cDay;bindDrop(dz,cDay,false);body.appendChild(dz);
  const grid=mk("div","day-grid");body.appendChild(grid);
  let first=true;
  for(let h=hs;h<he;h++){
    const lbl2=mk("div","day-lbl");lbl2.textContent=h+"h";grid.appendChild(lbl2);
    const slot=mk("div","day-sl"+(first?" first":""));first=false;
    slot.dataset.date=cDay;slot.dataset.hour=h;
    bindDrop(slot,cDay,true,h);
    todosOn(cDay).filter(t=>t.timeStart&&parseInt(t.timeStart.split(":")[0])===h).forEach((t,i)=>{
      const e=mk("div","day-ev "+(t.done?"day-ev-dn":"day-ev-td"));
      e.textContent=(t.timeStart||"")+(t.timeEnd?" – "+t.timeEnd:"")+" "+t.title;
      e.style.top=(i*26+2)+"px";slot.appendChild(e);
    });
    gcalOn(cDay).filter(e=>!e.allDay&&e.start.includes("T")&&parseInt(e.start.split("T")[1].split(":")[0])===h).forEach((e,i)=>{
      const ev=mk("div","day-ev day-ev-gc");
      ev.textContent=fT(e.start)+(e.end?" – "+fT(e.end):"")+" "+e.title;
      const off=todosOn(cDay).filter(t=>t.timeStart&&parseInt(t.timeStart.split(":")[0])===h).length;
      ev.style.top=((off+i)*26+2)+"px";slot.appendChild(ev);
    });
    grid.appendChild(slot);
  }
  selDay=cDay;showDet(cDay);
}

/* ══════ DETAIL ══════ */
function showDet(date){
  const panel=document.getElementById("detail");
  const todos=todosOn(date),gcals=gcalOn(date);
  if(!todos.length&&!gcals.length){panel.style.display="none";return;}
  panel.style.display="block";
  const d=new Date(date+"T00:00:00");
  const lbl=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
  panel.innerHTML=`<div class="det-t">📅 ${lbl.charAt(0).toUpperCase()+lbl.slice(1)}</div>`;
  todos.forEach(t=>panel.appendChild(buildDetRow(t)));
  gcals.forEach(e=>panel.appendChild(buildGcalRow(e)));
}
function buildDetRow(t){
  const row=mk("div","det-row"+(t.done?" done":""));
  const chk=mk("div","ck"+(t.done?" on":""));
  chk.innerHTML='<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>';
  chk.onclick=()=>{toggleDone(t.id);renderAg();};
  const name=mk("div","det-n");name.textContent=t.title;
  const time=mk("div","det-time");time.textContent=t.timeStart?(t.timeStart+(t.timeEnd?" – "+t.timeEnd:"")):"Journée";
  const del=mk("button","det-del");del.textContent="×";del.title="Retirer du calendrier";del.onclick=()=>removePlanned(t.id);
  row.append(chk,name,time,del);return row;
}
function buildGcalRow(e){
  const row=mk("div","gcal-row");
  row.append(mk("div","gcal-dot"));
  const name=mk("div","gcal-n");name.textContent=e.title;
  const time=mk("div","gcal-t");time.textContent=e.allDay?"Journée":(fT(e.start)+(e.end?" – "+fT(e.end):""));
  row.append(name,time);return row;
}

/* ══════ DRAG & DROP ══════ */
function bindDrop(el2,date,withHour,hour){
  el2.addEventListener("dragover",e=>{e.preventDefault();el2.classList.add("drag-ov");});
  el2.addEventListener("dragleave",()=>el2.classList.remove("drag-ov"));
  el2.addEventListener("drop",e=>{
    e.preventDefault();el2.classList.remove("drag-ov");
    const tid=e.dataTransfer.getData("tid");if(!tid)return;
    if(withHour&&hour!==undefined)openModal(tid,date,z(hour)+":00",z(Math.min(hour+1,23))+":00");
    else openModal(tid,date,"09:00","10:00");
  });
}
document.addEventListener("dragover",e=>e.preventDefault());
document.addEventListener("drop",e=>{
  const tid=e.dataTransfer.getData("tid");if(!tid)return;
  const tgt=e.target.closest("[data-date]");if(!tgt)return;
  const date=tgt.dataset.date,hour=tgt.dataset.hour;
  if(hour!==undefined)openModal(tid,date,z(parseInt(hour))+":00",z(Math.min(parseInt(hour)+1,23))+":00");
  else openModal(tid,date,"09:00","10:00");
});

/* Touch drag */
const ghost=document.getElementById("ghost");
function setupTouch(item,tid2){
  let sx,sy;
  item.addEventListener("touchstart",e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  item.addEventListener("touchmove",e=>{
    const cx=e.touches[0].clientX,cy=e.touches[0].clientY;
    if(Math.abs(cx-sx)>8||Math.abs(cy-sy)>8){
      if(!touchDragId){
        touchDragId=tid2;const t=S.tasks.find(t=>t.id===tid2);
        ghost.textContent=t?t.title:"";ghost.style.display="block";
        item.classList.add("dragging");if(curTab==="todo")goTab("agenda");
      }
      e.preventDefault();
      ghost.style.left=(cx-70)+"px";ghost.style.top=(cy-20)+"px";
      document.querySelectorAll(".drag-ov").forEach(x=>x.classList.remove("drag-ov"));
      const under=document.elementFromPoint(cx,cy);
      const tgt=under?.closest("[data-date]");
      if(tgt){
        tgt.classList.add("drag-ov");
        /* Hold on month cell for day view */
        if(view==="month"&&tgt.classList.contains("md")){
          const d=tgt.dataset.date;
          if(d!==tHoldDate){clearTimeout(tHoldTimer);tHoldDate=d;tHoldTimer=setTimeout(()=>{if(tHoldDate===d){cDay=d;selDay=d;setView("day");}},800);}
        } else {clearTimeout(tHoldTimer);tHoldDate=null;}
        /* Edge scroll */
        const rect=document.getElementById("ag-body").getBoundingClientRect();
        const side=cx<rect.left+50?"left":cx>rect.right-50?"right":null;
        if(side&&side!==tEdgeSide){
          clearTimeout(tEdgeTimer);tEdgeSide=side;
          const ezL=document.querySelector(".edge-zone.left"),ezR=document.querySelector(".edge-zone.right");
          if(ezL)ezL.classList.toggle("lit",side==="left");
          if(ezR)ezR.classList.toggle("lit",side==="right");
          tEdgeTimer=setTimeout(()=>{tEdgeSide=null;if(ezL)ezL.classList.remove("lit");if(ezR)ezR.classList.remove("lit");if(side==="left")navPrev();else navNext();},700);
        } else if(!side){clearTimeout(tEdgeTimer);tEdgeSide=null;document.querySelectorAll(".edge-zone").forEach(z=>z.classList.remove("lit"));}
      } else {clearTimeout(tHoldTimer);tHoldDate=null;clearTimeout(tEdgeTimer);tEdgeSide=null;}
    }
  },{passive:false});
  item.addEventListener("touchend",e=>{
    clearTimeout(tHoldTimer);tHoldDate=null;clearTimeout(tEdgeTimer);tEdgeSide=null;
    document.querySelectorAll(".edge-zone").forEach(z=>z.classList.remove("lit"));
    if(touchDragId){
      const under=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
      const tgt=under?.closest("[data-date]");
      if(tgt?.dataset.date){
        const date=tgt.dataset.date,hour=tgt.dataset.hour;
        if(hour!==undefined)openModal(touchDragId,date,z(parseInt(hour))+":00",z(Math.min(parseInt(hour)+1,23))+":00");
        else openModal(touchDragId,date,"09:00","10:00");
      }
      ghost.style.display="none";
      document.querySelectorAll(".drag-ov").forEach(x=>x.classList.remove("drag-ov"));
      item.classList.remove("dragging");touchDragId=null;
    }
  });
}

/* ══════ MODAL ══════ */
function openModal(tid,date,tS,tE){
  const t=S.tasks.find(t=>t.id===tid);if(!t)return;
  pending={tid,date};
  document.getElementById("mo-task").textContent=t.title;
  document.getElementById("mo-date").value=date;
  document.getElementById("mo-start").value=tS||"09:00";
  document.getElementById("mo-end").value=tE||"10:00";
  document.getElementById("overlay").classList.add("open");
}
function closeModal(){document.getElementById("overlay").classList.remove("open");pending=null;}
async function confirmPlan(withTime){
  if(!pending)return;
  const date=document.getElementById("mo-date").value;
  const ts=withTime?document.getElementById("mo-start").value:null;
  const te=withTime?document.getElementById("mo-end").value:null;
  const tid=pending.tid;closeModal();await planTask(tid,date,ts,te);
}
document.getElementById("overlay").addEventListener("click",e=>{if(e.target===document.getElementById("overlay"))closeModal();});

/* ══════ PLAN ══════ */
async function planTask(tid,date,tS,tE){
  const t=S.tasks.find(t=>t.id===tid);if(!t)return;
  if(t.gcalId){await delGcalEv(t.gcalId);t.gcalId=null;}
  t.plannedDate=date;t.timeStart=tS||null;t.timeEnd=tE||null;
  lsSave();
  if(token){showSync("Envoi Google Agenda…");t.gcalId=await createGcalEv(t,date,tS,tE);hideSync();await saveDrive();await fetchGcal();}
  selDay=date;cDay=date;
  renderTasks();renderAg();
  toast('📌 "'+(t.title.length>18?t.title.slice(0,18)+'…':t.title)+'" planifié'+(tS?' à '+tS:''));
}

/* ══════ CRUD ══════ */
function addTask(){
  const title=document.getElementById("ti").value.trim();if(!title)return;
  const due=document.getElementById("tdat").value||null;
  S.tasks.unshift({id:uid(),title,due,done:false,plannedDate:null,timeStart:null,timeEnd:null,gcalId:null});
  lsSave();if(token)saveDrive();renderTasks();
  document.getElementById("ti").value="";document.getElementById("tdat").value="";
}
function toggleDone(id){const t=S.tasks.find(t=>t.id===id);if(!t)return;t.done=!t.done;lsSave();if(token)saveDrive();renderTasks();}
async function deleteTask(id){
  const t=S.tasks.find(t=>t.id===id);
  if(t?.gcalId){showSync("Suppression…");await delGcalEv(t.gcalId);hideSync();}
  S.tasks=S.tasks.filter(t=>t.id!==id);lsSave();if(token)saveDrive();
  renderTasks();if(curTab==="agenda")renderAg();
}
async function removePlanned(id){
  const t=S.tasks.find(t=>t.id===id);if(!t)return;
  if(t.gcalId){showSync("Suppression…");await delGcalEv(t.gcalId);hideSync();}
  t.plannedDate=null;t.timeStart=null;t.timeEnd=null;t.gcalId=null;
  lsSave();if(token)saveDrive();renderTasks();renderAg();toast("Retiré du calendrier");
}

/* ══════ RENDER TASKS ══════ */
function renderTasks(){
  const tl=document.getElementById("list-todo");
  const dl=document.getElementById("list-done");
  const cd=document.getElementById("card-done");
  const dh=document.getElementById("dh");
  const todo=S.tasks.filter(t=>!t.done),done=S.tasks.filter(t=>t.done);
  tl.innerHTML="";dl.innerHTML="";
  if(!todo.length){tl.innerHTML='<div class="emp">Aucune tâche 🎉</div>';dh.style.display="none";}
  else{todo.forEach(t=>tl.appendChild(buildTask(t)));dh.style.display="block";}
  cd.style.display=done.length?"block":"none";
  done.forEach(t=>dl.appendChild(buildTask(t)));
}
function buildTask(t){
  const item=mk("div","ti"+(t.done?" done":""));item.dataset.id=t.id;item.draggable=true;
  const today=ds(NOW),overdue=t.due&&t.due<today&&!t.done;
  const chk=mk("div","ck"+(t.done?" on":""));
  chk.innerHTML='<svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round"/></svg>';
  chk.onclick=()=>toggleDone(t.id);
  const body=mk("div","tb");
  const name=mk("div","tn");name.textContent=t.title;
  const tags=mk("div","tgs");
  if(t.due){const tg=mk("div","tg tg-d"+(overdue?" ov":""));tg.textContent="📅 Échéance : "+fD(t.due);tags.appendChild(tg);}
  if(t.plannedDate){
    const tg=mk("div","tg tg-p");
    let label="📌 Planifié : ";
    if(t.timeStart){label+=t.timeStart;if(t.timeEnd)label+=" – "+t.timeEnd;label+=" ";}
    label+=fD(t.plannedDate);
    tg.textContent=label;tags.appendChild(tg);
  }
  if(t.gcalId){const tg=mk("div","tg tg-g");tg.textContent="✓ Google Agenda";tags.appendChild(tg);}
  body.append(name,tags);
  const plan=mk("button","td-btn");plan.textContent="📅";plan.title="Planifier dans l’agenda";
  plan.onclick=()=>{const d=t.plannedDate||ds(NOW);openModal(t.id,d,"09:00","10:00");};
  const del=mk("button","td-btn");del.textContent="×";del.onclick=()=>deleteTask(t.id);
  item.append(chk,body,plan,del);
  item.addEventListener("dragstart",e=>{
    e.dataTransfer.setData("tid",t.id);
    e.dataTransfer.effectAllowed="move";
    item.classList.add("dragging");
    clearTimeout(holdTimer);holdDate=null;clearTimeout(edgeTimer);edgeSide=null;
  });
  item.addEventListener("dragend",()=>{
    item.classList.remove("dragging");
    clearTimeout(holdTimer);holdDate=null;clearTimeout(edgeTimer);edgeSide=null;
    document.querySelectorAll(".edge-zone").forEach(z=>z.classList.remove("lit"));
  });
  setupTouch(item,t.id);
  return item;
}

/* ══════ INIT ══════ */
document.getElementById("ti").addEventListener("keydown",e=>{if(e.key==="Enter")addTask();});
renderTasks();
renderAg();
</script>

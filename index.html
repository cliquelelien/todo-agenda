<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Todo & Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --blue-dark:#1a56a0; --blue-mid:#2a7de1; --blue-light:#ddeeff;
  --blue-bg:#f0f6ff; --blue-border:#b8d4f0;
  --orange:#f5a623; --orange-light:#fff8e6;
  --green:#34a853; --green-light:#e6f4ea;
  --text:#1a2a4a; --text2:#4a6080; --text3:#8aaac8;
  --white:#fff; --radius:12px; --shadow:0 2px 8px rgba(26,86,160,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:var(--blue-bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:linear-gradient(135deg,#1a56a0 0%,#2a7de1 100%);padding:0 16px;height:52px;display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(26,86,160,.25);}
header h1{font-size:17px;font-weight:800;color:#fff;flex:1;}
.btn-google{display:flex;align-items:center;gap:6px;background:#fff;border:none;border-radius:8px;padding:6px 11px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;cursor:pointer;color:#1a56a0;transition:opacity .15s;}
.btn-google:hover{opacity:.9;}
.btn-google img{width:16px;height:16px;}
.google-status{font-size:11px;font-weight:700;color:rgba(255,255,255,.8);}
.google-status.ok{color:#a8f0c0;}

/* NAV */
nav{background:var(--white);border-bottom:2px solid var(--blue-border);padding:0 16px;display:flex;gap:4px;}
.tab{padding:11px 16px;font-family:'Nunito',sans-serif;font-weight:700;font-size:13px;border:none;background:transparent;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s;}
.tab.active{color:var(--blue-mid);border-bottom-color:var(--blue-mid);}

.main{padding:14px;max-width:1000px;margin:0 auto;}
.panel{display:none;}.panel.active{display:block;}

/* BLOCK */
.block{background:var(--white);border:1.5px solid var(--blue-border);border-radius:var(--radius);padding:14px;margin-bottom:12px;box-shadow:var(--shadow);}
.block-title{font-weight:800;font-size:14px;color:var(--blue-dark);margin-bottom:12px;}

/* FORM */
.form-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
input[type="text"],input[type="date"]{font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:var(--blue-bg);border:1.5px solid var(--blue-border);border-radius:10px;padding:8px 12px;outline:none;transition:border-color .2s;}
input[type="text"]{flex:1;min-width:150px;}
input[type="text"]:focus,input[type="date"]:focus{border-color:var(--blue-mid);}
input::placeholder{color:var(--text3);font-weight:600;}
input[type="date"]{color-scheme:light;}
.btn-primary{background:var(--blue-mid);color:#fff;border:none;border-radius:10px;padding:8px 16px;font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;cursor:pointer;transition:background .15s,transform .1s;white-space:nowrap;}
.btn-primary:hover{background:var(--blue-dark);}
.btn-primary:active{transform:scale(.97);}

/* TASKS */
.task-list{display:flex;flex-direction:column;gap:6px;}
.task-item{background:var(--white);border:1.5px solid var(--blue-border);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px;cursor:grab;transition:border-color .15s,box-shadow .15s;user-select:none;}
.task-item:hover{border-color:var(--blue-mid);box-shadow:0 2px 10px rgba(42,125,225,.12);}
.task-item.dragging{opacity:.4;}
.task-item.done{background:#f8fbff;}
.task-check{width:22px;height:22px;flex-shrink:0;border:2px solid var(--blue-border);border-radius:6px;cursor:pointer;background:var(--white);display:flex;align-items:center;justify-content:center;transition:border-color .2s,background .2s;}
.task-item.done .task-check{background:var(--orange);border-color:var(--orange);}
.task-check svg{display:none;}
.task-item.done .task-check svg{display:block;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:14px;font-weight:700;color:var(--text);}
.task-item.done .task-title{text-decoration:line-through;color:var(--text3);}
.task-meta{display:flex;gap:6px;margin-top:2px;flex-wrap:wrap;align-items:center;}
.task-date{font-size:11px;font-weight:700;color:var(--text3);}
.task-date.overdue{color:#e05a2b;}
.badge-planned{font-size:10px;font-weight:800;background:var(--orange-light);color:var(--orange);border:1px solid var(--orange);border-radius:5px;padding:1px 6px;}
.badge-gcal{font-size:10px;font-weight:800;background:var(--green-light);color:var(--green);border:1px solid var(--green);border-radius:5px;padding:1px 6px;}
.btn-del{background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;padding:0 2px;line-height:1;transition:color .15s;flex-shrink:0;}
.btn-del:hover{color:#e05a2b;}
.drag-hint{text-align:center;font-size:12px;font-weight:700;color:var(--text3);margin-top:10px;}
.empty-msg{color:var(--text3);font-size:13px;font-weight:700;text-align:center;padding:14px 0;}

/* AGENDA TOOLBAR */
.agenda-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px;flex-wrap:wrap;}
.agenda-nav{display:flex;align-items:center;gap:6px;}
.agenda-nav button{background:var(--blue-bg);border:1.5px solid var(--blue-border);border-radius:8px;color:var(--blue-mid);width:32px;height:32px;cursor:pointer;font-size:17px;font-weight:800;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.agenda-nav button:hover{background:var(--blue-light);}
.agenda-period{font-weight:800;font-size:14px;color:var(--blue-dark);min-width:140px;text-align:center;}
.view-switcher{display:flex;gap:3px;}
.view-btn{padding:5px 11px;border:1.5px solid var(--blue-border);background:var(--white);border-radius:8px;font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s;}
.view-btn.active{background:var(--blue-mid);border-color:var(--blue-mid);color:#fff;}

/* HOUR RANGE CONFIG */
.hour-config{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;color:var(--text3);}
.hour-config select{font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--text);background:var(--blue-bg);border:1.5px solid var(--blue-border);border-radius:8px;padding:4px 8px;outline:none;}

/* ---- MONTH VIEW ---- */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-header{text-align:center;font-size:10px;font-weight:800;color:var(--text3);padding:5px 0;text-transform:uppercase;letter-spacing:.07em;}
.cal-day{background:var(--white);border:1.5px solid var(--blue-border);border-radius:8px;height:72px;overflow:hidden;padding:5px 4px 3px;cursor:pointer;transition:border-color .15s,background .15s;display:flex;flex-direction:column;}
.cal-day:hover{border-color:var(--blue-mid);background:var(--blue-bg);}
.cal-day.other-month{opacity:.22;pointer-events:none;}
.cal-day.today{border-color:var(--blue-mid);background:var(--blue-light);}
.cal-day.selected{border-color:var(--orange)!important;background:var(--orange-light)!important;}
.cal-day.drop-target{border-color:var(--orange)!important;background:var(--orange-light)!important;}
.cal-num{font-size:12px;font-weight:800;color:var(--text2);flex-shrink:0;margin-bottom:2px;}
.cal-day.today .cal-num{color:var(--blue-mid);}
.cal-day.selected .cal-num{color:var(--orange);}
.cal-dots{display:flex;flex-direction:column;gap:2px;overflow:hidden;flex:1;}
.cal-dot{height:13px;flex-shrink:0;border-radius:4px;font-size:9px;font-weight:700;color:#fff;padding:0 4px;display:flex;align-items:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cal-dot.todo-dot{background:var(--blue-mid);}
.cal-dot.gcal-dot{background:var(--green);}
.cal-dot.done-dot{background:#6ec96e;}
.cal-dot.more{background:var(--text3);}

/* ---- WEEK VIEW ---- */
.week-wrapper{overflow-x:auto;}
.week-table{display:grid;grid-template-columns:44px repeat(7,1fr);min-width:520px;}
.week-head-empty{background:transparent;}
.week-head-day{background:var(--white);border:1.5px solid var(--blue-border);border-radius:8px 8px 0 0;padding:6px 4px;text-align:center;margin:0 2px;}
.week-head-day.today{background:var(--blue-light);border-color:var(--blue-mid);}
.week-head-day.selected{background:var(--orange-light);border-color:var(--orange);}
.week-day-name{font-size:10px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.week-day-num{font-size:18px;font-weight:800;color:var(--text2);}
.week-head-day.today .week-day-num{color:var(--blue-mid);}
.week-head-day.selected .week-day-num{color:var(--orange);}

.week-time-label{font-size:10px;font-weight:700;color:var(--text3);text-align:right;padding-right:6px;height:48px;display:flex;align-items:flex-start;padding-top:2px;}
.week-cell{height:48px;border:1px solid var(--blue-border);border-top:none;border-left:none;background:var(--white);margin:0 2px;position:relative;transition:background .12s;}
.week-cell:first-of-type{border-top:1px solid var(--blue-border);}
.week-cell.drop-target{background:var(--orange-light)!important;}
.week-cell.today-col{background:#f5f9ff;}
.week-cell.past{background:#fafafa;}
.week-event{position:absolute;left:2px;right:2px;top:2px;border-radius:5px;font-size:10px;font-weight:700;color:#fff;padding:2px 5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:pointer;z-index:2;}
.week-event.todo-ev{background:var(--blue-mid);}
.week-event.gcal-ev{background:var(--green);}
.week-event.done-ev{background:#6ec96e;}
.week-allday-row{grid-column:2/-1;display:grid;grid-template-columns:repeat(7,1fr);}
.week-allday-cell{min-height:22px;border:1px solid var(--blue-border);border-top:none;background:var(--white);margin:0 2px;padding:2px 3px;}
.week-allday-task{background:var(--blue-mid);color:#fff;border-radius:4px;font-size:10px;font-weight:700;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.week-allday-task.gcal-ev{background:var(--green);}

/* ---- DAY VIEW ---- */
.day-header-bar{font-weight:800;font-size:15px;color:var(--blue-dark);margin-bottom:10px;}
.day-time-grid{position:relative;}
.day-row{display:grid;grid-template-columns:44px 1fr;height:48px;}
.day-time{font-size:10px;font-weight:700;color:var(--text3);text-align:right;padding-right:8px;display:flex;align-items:flex-start;padding-top:2px;}
.day-slot{border:1px solid var(--blue-border);border-top:none;background:var(--white);position:relative;transition:background .12s;}
.day-row:first-child .day-slot{border-top:1px solid var(--blue-border);}
.day-slot.drop-target{background:var(--orange-light)!important;}
.day-event{position:absolute;left:3px;right:3px;border-radius:6px;font-size:11px;font-weight:700;color:#fff;padding:3px 7px;overflow:hidden;cursor:pointer;z-index:2;min-height:20px;}
.day-event.todo-ev{background:var(--blue-mid);}
.day-event.gcal-ev{background:var(--green);}
.day-event.done-ev{background:#6ec96e;}
.day-allday{background:var(--white);border:1.5px solid var(--blue-border);border-radius:8px;padding:8px 10px;margin-bottom:8px;}
.day-allday-title{font-size:11px;font-weight:800;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.06em;}

/* DETAIL PANEL */
.detail-panel{background:var(--white);border:1.5px solid var(--blue-border);border-radius:var(--radius);padding:14px;margin-top:12px;}
.detail-title{font-weight:800;font-size:14px;color:var(--blue-dark);margin-bottom:10px;}
.detail-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--blue-bg);}
.detail-row:last-child{border-bottom:none;}
.detail-name{flex:1;font-size:13px;font-weight:700;color:var(--text);}
.detail-row.done .detail-name{text-decoration:line-through;color:var(--text3);}
.detail-time{font-size:11px;font-weight:700;color:var(--text3);}

/* GCAL EVENTS (read-only) */
.gcal-event-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--blue-bg);}
.gcal-event-row:last-child{border-bottom:none;}
.gcal-dot-badge{width:10px;height:10px;border-radius:50%;background:var(--green);flex-shrink:0;}
.gcal-event-name{flex:1;font-size:13px;font-weight:700;color:var(--text);}
.gcal-event-time{font-size:11px;font-weight:700;color:var(--text3);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:var(--radius);padding:22px;width:90%;max-width:340px;box-shadow:0 8px 32px rgba(0,0,0,.18);}
.modal h3{font-size:16px;font-weight:800;color:var(--blue-dark);margin-bottom:16px;}
.modal label{font-size:12px;font-weight:800;color:var(--text2);display:block;margin-bottom:4px;}
.modal input[type="time"],.modal input[type="date"]{width:100%;margin-bottom:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:var(--blue-bg);border:1.5px solid var(--blue-border);border-radius:10px;padding:8px 12px;outline:none;}
.modal-btns{display:flex;gap:8px;margin-top:4px;}
.btn-cancel{flex:1;padding:9px;border:1.5px solid var(--blue-border);border-radius:10px;background:var(--white);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:var(--text2);cursor:pointer;}
.btn-confirm{flex:1;padding:9px;border:none;border-radius:10px;background:var(--blue-mid);font-family:'Nunito',sans-serif;font-weight:800;font-size:13px;color:#fff;cursor:pointer;}

/* SYNC BANNER */
.sync-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--green-light);border:1.5px solid var(--green);border-radius:10px;margin-bottom:12px;font-size:12px;font-weight:700;color:#1a6630;}
.sync-bar.error{background:#fdecea;border-color:#e05a2b;color:#c0392b;}
.sync-spinner{width:14px;height:14px;border:2px solid #ccc;border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;}
@keyframes spin{to{transform:rotate(360deg);}}

/* GHOST & TOAST */
.ghost-el{position:fixed;z-index:999;pointer-events:none;background:var(--orange-light);border:2px solid var(--orange);border-radius:10px;padding:8px 13px;font-size:13px;font-weight:700;color:var(--text);box-shadow:0 8px 24px rgba(245,166,35,.3);max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:none;transform:rotate(-1.5deg);font-family:'Nunito',sans-serif;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--blue-dark);color:#fff;border-radius:30px;padding:9px 18px;font-size:13px;font-weight:700;z-index:9999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);pointer-events:none;white-space:nowrap;font-family:'Nunito',sans-serif;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <span style="font-size:20px">📋</span>
  <h1>Todo & Agenda</h1>
  <span class="google-status" id="google-status">Non connecté</span>
  <button class="btn-google" id="btn-google" onclick="handleGoogleAuth()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="G">
    Connexion Google
  </button>
</header>

<!-- NAV -->
<nav>
  <button class="tab active" onclick="switchTab('todo')">✅ Todo</button>
  <button class="tab" onclick="switchTab('agenda')">📅 Agenda</button>
</nav>

<div class="main">

  <!-- TODO PANEL -->
  <div class="panel active" id="panel-todo">
    <div class="block">
      <div class="block-title">✏️ Nouvelle tâche</div>
      <div class="form-row">
        <input type="text" id="task-input" placeholder="Titre de la tâche…" maxlength="120">
        <input type="date" id="date-input">
        <button class="btn-primary" onclick="addTask()">+ Ajouter</button>
      </div>
    </div>
    <div class="block">
      <div class="block-title">🔵 À faire</div>
      <div class="task-list" id="todo-list"></div>
      <div class="drag-hint" id="drag-hint" style="display:none">↔ Glissez une tâche sur l'Agenda pour la planifier</div>
    </div>
    <div class="block" id="done-block" style="display:none">
      <div class="block-title">✅ Terminées</div>
      <div class="task-list" id="done-list"></div>
    </div>
  </div>

  <!-- AGENDA PANEL -->
  <div class="panel" id="panel-agenda">
    <div id="sync-banner" style="display:none" class="sync-bar">
      <div class="sync-spinner"></div>
      <span id="sync-msg">Synchronisation Google Agenda…</span>
    </div>
    <div class="block">
      <div class="agenda-toolbar">
        <div class="agenda-nav">
          <button onclick="agendaPrev()">‹</button>
          <div class="agenda-period" id="agenda-period"></div>
          <button onclick="agendaNext()">›</button>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
          <div class="hour-config" id="hour-config" style="display:none">
            <span>De</span>
            <select id="hour-start" onchange="renderAgenda()"></select>
            <span>à</span>
            <select id="hour-end" onchange="renderAgenda()"></select>
          </div>
          <div class="view-switcher">
            <button class="view-btn active" id="vbtn-month" onclick="setView('month')">Mois</button>
            <button class="view-btn" id="vbtn-week" onclick="setView('week')">Semaine</button>
            <button class="view-btn" id="vbtn-day" onclick="setView('day')">Jour</button>
          </div>
        </div>
      </div>
      <div id="cal-container"></div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <div class="empty-msg">Sélectionnez un jour</div>
    </div>
  </div>

</div>

<!-- MODAL: heure pour drop -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h3>📌 Planifier la tâche</h3>
    <div id="modal-task-name" style="font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px;padding:10px;background:var(--blue-bg);border-radius:8px;"></div>
    <label>Date</label>
    <input type="date" id="modal-date">
    <label>Heure de début</label>
    <input type="time" id="modal-time-start" value="09:00">
    <label>Heure de fin</label>
    <input type="time" id="modal-time-end" value="10:00">
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmPlan()">Planifier ✓</button>
    </div>
  </div>
</div>

<div class="ghost-el" id="ghost-el"></div>
<div class="toast" id="toast"></div>

<script>
/* ================================================================
   CONFIG
================================================================ */
const CLIENT_ID = '967524451418-ti36ivnj5ep40sa3q041alqo6ndfma9k.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar https://www.googleapis.com/auth/drive.appdata';
const DRIVE_FILE_NAME = 'todo-agenda-data.json';
const SK = 'todoagenda_v3';

/* ================================================================
   STATE
================================================================ */
let state = { tasks: [] };
let googleToken = null;
let gcalEvents = []; // événements lus depuis Google Calendar
let driveFileId = null;
let currentTab = 'todo';
let calView = 'month';
let calYear, calMonth, calWeekStart, calDay;
let selectedDay = null;
let pendingDrop = null; // { taskId, date } en attente de modal
let touchDragId = null;

const now = new Date();
calYear = now.getFullYear(); calMonth = now.getMonth();
calDay = ds(now);
calWeekStart = mondayOf(now);

function ds(d) { return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
function p2(n) { return String(n).padStart(2,'0'); }
function mondayOf(d) { const x=new Date(d); const dow=x.getDay()||7; x.setDate(x.getDate()-dow+1); x.setHours(0,0,0,0); return x; }
function genId() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

/* ================================================================
   HOUR SELECTS
================================================================ */
(function initHourSelects(){
  const hs=document.getElementById('hour-start');
  const he=document.getElementById('hour-end');
  for(let h=0;h<24;h++){
    const o1=document.createElement('option'); o1.value=h; o1.textContent=h+'h00'; hs.appendChild(o1);
    const o2=document.createElement('option'); o2.value=h; o2.textContent=h+'h00'; he.appendChild(o2);
  }
  hs.value=8; he.value=20;
})();
function hourStart(){ return parseInt(document.getElementById('hour-start').value); }
function hourEnd(){ return parseInt(document.getElementById('hour-end').value); }

/* ================================================================
   LOCAL STORAGE
================================================================ */
function loadLocal(){ try{ return JSON.parse(localStorage.getItem(SK))||{tasks:[]}; }catch{ return {tasks:[]}; } }
function saveLocal(){ localStorage.setItem(SK,JSON.stringify(state)); }

/* ================================================================
   GOOGLE AUTH (GIS + gapi)
================================================================ */
let tokenClient = null;
let gapiLoaded = false;
let gisLoaded = false;

function onGapiLoad(){
  gapi.load('client', async ()=>{
    await gapi.client.init({});
    await gapi.client.load('https://www.googleapis.com/discovery/v1/apis/calendar/v3/rest');
    gapiLoaded = true;
    tryAutoConnect();
  });
}
function onGisLoad(){
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp)=>{
      if(resp.error){ showToast('❌ Connexion annulée'); return; }
      googleToken = resp.access_token;
      gapi.client.setToken({ access_token: googleToken });
      localStorage.setItem('gtoken', googleToken);
      onGoogleConnected();
    }
  });
  gisLoaded = true;
  tryAutoConnect();
}
function tryAutoConnect(){
  if(!gapiLoaded||!gisLoaded) return;
  const saved = localStorage.getItem('gtoken');
  if(saved){ googleToken=saved; gapi.client.setToken({access_token:saved}); onGoogleConnected(); }
}
function handleGoogleAuth(){
  if(googleToken){ disconnectGoogle(); return; }
  if(!tokenClient){ showToast('Chargement en cours…'); return; }
  tokenClient.requestAccessToken({ prompt:'' });
}
function disconnectGoogle(){
  google.accounts.oauth2.revoke(googleToken, ()=>{});
  googleToken=null; localStorage.removeItem('gtoken');
  gcalEvents=[];
  document.getElementById('google-status').textContent='Non connecté';
  document.getElementById('google-status').className='google-status';
  document.getElementById('btn-google').innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:16px;height:16px" alt="G"> Connexion Google';
  showToast('Déconnecté de Google');
}
async function onGoogleConnected(){
  document.getElementById('google-status').textContent='✓ Google connecté';
  document.getElementById('google-status').className='google-status ok';
  document.getElementById('btn-google').innerHTML='<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:16px;height:16px" alt="G"> Déconnecter';
  showToast('✓ Google connecté !');
  await loadFromDrive();
  await fetchGCalEvents();
  renderTasks();
  if(currentTab==='agenda') renderAgenda();
}

/* ================================================================
   GOOGLE DRIVE — sauvegarde
================================================================ */
async function findDriveFile(){
  const r = await gapi.client.request({
    path:'https://www.googleapis.com/drive/v3/files',
    params:{ spaces:'appDataFolder', q:`name='${DRIVE_FILE_NAME}'`, fields:'files(id,name)' }
  });
  const files = r.result.files||[];
  return files.length ? files[0].id : null;
}
async function loadFromDrive(){
  try{
    showSync('Chargement depuis Google Drive…');
    driveFileId = await findDriveFile();
    if(!driveFileId){ hideSyncBar(); return; }
    const r = await gapi.client.request({
      path:`https://www.googleapis.com/drive/v3/files/${driveFileId}`,
      params:{ alt:'media' }
    });
    const data = typeof r.result==='string' ? JSON.parse(r.result) : r.result;
    if(data && data.tasks) state = data;
    saveLocal();
    hideSyncBar();
    showToast('📂 Données chargées depuis Drive');
  }catch(e){ hideSyncBar(); }
}
async function saveToDrive(){
  if(!googleToken) return;
  try{
    const body = JSON.stringify(state);
    if(!driveFileId){
      // Créer le fichier
      const meta = await gapi.client.request({
        path:'https://www.googleapis.com/drive/v3/files',
        method:'POST',
        body:JSON.stringify({ name:DRIVE_FILE_NAME, parents:['appDataFolder'] }),
        headers:{'Content-Type':'application/json'}
      });
      driveFileId = meta.result.id;
    }
    // Uploader le contenu
    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=media`,{
      method:'PATCH',
      headers:{ Authorization:'Bearer '+googleToken, 'Content-Type':'application/json' },
      body
    });
  }catch(e){ console.warn('Drive save error',e); }
}

/* ================================================================
   GOOGLE CALENDAR — lecture
================================================================ */
async function fetchGCalEvents(){
  if(!googleToken) return;
  showSync('Chargement Google Agenda…');
  try{
    const timeMin = new Date(); timeMin.setMonth(timeMin.getMonth()-1);
    const timeMax = new Date(); timeMax.setMonth(timeMax.getMonth()+3);
    const r = await gapi.client.calendar.events.list({
      calendarId:'primary',
      timeMin:timeMin.toISOString(),
      timeMax:timeMax.toISOString(),
      singleEvents:true,
      orderBy:'startTime',
      maxResults:500
    });
    gcalEvents = (r.result.items||[]).map(ev=>({
      id:ev.id,
      title:ev.summary||'(sans titre)',
      start:ev.start.dateTime||ev.start.date,
      end:ev.end.dateTime||ev.end.date,
      allDay:!ev.start.dateTime,
      source:'gcal'
    }));
    hideSyncBar();
  }catch(e){
    showSyncError('Erreur Google Agenda: '+e.message);
    setTimeout(hideSyncBar,3000);
  }
}

/* Créer un event dans Google Calendar */
async function createGCalEvent(task, dateStr, timeStart, timeEnd){
  if(!googleToken) return null;
  try{
    const body = {
      summary: task.title,
      start: timeStart ? { dateTime:`${dateStr}T${timeStart}:00`, timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone }
                       : { date:dateStr },
      end:   timeEnd   ? { dateTime:`${dateStr}T${timeEnd}:00`,   timeZone:Intl.DateTimeFormat().resolvedOptions().timeZone }
                       : { date:dateStr }
    };
    const r = await gapi.client.calendar.events.insert({ calendarId:'primary', resource:body });
    return r.result.id;
  }catch(e){ console.warn('GCal insert error',e); return null; }
}

================================================================ */
function setView(v){
  calView=v;
  ['month','week','day'].forEach(x=>document.getElementById('vbtn-'+x).classList.toggle('active',x===v));
  document.getElementById('hour-config').style.display=(v==='month'?'none':'flex');
  renderAgenda();
}
function agendaPrev(){
  if(calView==='month'){ calMonth--; if(calMonth<0){calMonth=11;calYear--;} }
  else if(calView==='week'){ calWeekStart=new Date(calWeekStart); calWeekStart.setDate(calWeekStart.getDate()-7); }
  else { const d=new Date(calDay+'T00:00:00'); d.setDate(d.getDate()-1); calDay=ds(d); }
  renderAgenda();
}
function agendaNext(){
  if(calView==='month'){ calMonth++; if(calMonth>11){calMonth=0;calYear++;} }
  else if(calView==='week'){ calWeekStart=new Date(calWeekStart); calWeekStart.setDate(calWeekStart.getDate()+7); }
  else { const d=new Date(calDay+'T00:00:00'); d.setDate(d.getDate()+1); calDay=ds(d); }
  renderAgenda();
}
function renderAgenda(){
  if(calView==='month') renderMonth();
  else if(calView==='week') renderWeek();
  else renderDay();
}

/* ================================================================
   HELPERS — events for a date
================================================================ */
function todoForDate(dateStr){ return state.tasks.filter(t=>t.plannedDate===dateStr); }
function gcalForDate(dateStr){ return gcalEvents.filter(ev=>{ const d=ev.start.slice(0,10); return d===dateStr; }); }
function gcalForDateRange(ds1,ds2){ return gcalEvents.filter(ev=>{ const d=ev.start.slice(0,10); return d>=ds1&&d<=ds2; }); }

function parseTime(iso){ // returns minutes from midnight or null
  if(!iso||!iso.includes('T')) return null;
  const t=iso.split('T')[1].slice(0,5);
  const [h,m]=t.split(':').map(Number);
  return h*60+m;
}

/* ================================================================
   MONTH VIEW
================================================================ */
const MONTHS_FR=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const DAYS_FR=['Lu','Ma','Me','Je','Ve','Sa','Di'];

function renderMonth(){
  document.getElementById('agenda-period').textContent=MONTHS_FR[calMonth]+' '+calYear;
  const cont=document.getElementById('cal-container'); cont.innerHTML='';
  const grid=document.createElement('div'); grid.className='cal-grid'; cont.appendChild(grid);

  DAYS_FR.forEach(d=>{ const h=document.createElement('div'); h.className='cal-header'; h.textContent=d; grid.appendChild(h); });

  const firstDow=(()=>{ let d=new Date(calYear,calMonth,1).getDay(); return d===0?6:d-1; })();
  const dim=new Date(calYear,calMonth+1,0).getDate();
  const prevD=new Date(calYear,calMonth,0).getDate();
  const todayStr=ds(now);

  let cells=[];
  for(let i=firstDow-1;i>=0;i--) cells.push({d:prevD-i,cur:false});
  for(let i=1;i<=dim;i++) cells.push({d:i,cur:true});
  while(cells.length%7!==0) cells.push({d:cells.length-dim-firstDow+1,cur:false});

  cells.forEach(cell=>{
    const div=document.createElement('div');
    div.className='cal-day'+(cell.cur?'':' other-month');
    if(cell.cur){
      const dateStr=`${calYear}-${p2(calMonth+1)}-${p2(cell.d)}`;
      div.dataset.date=dateStr;
      if(dateStr===todayStr) div.classList.add('today');
      if(dateStr===selectedDay) div.classList.add('selected');
      bindDrop(div,dateStr,false); // month = pas d'heure
      div.addEventListener('click',()=>{ selectedDay=dateStr; renderMonth(); renderDetail(dateStr); });

      const todos=todoForDate(dateStr);
      const gcals=gcalForDate(dateStr);
      div.innerHTML=`<div class="cal-num">${cell.d}</div><div class="cal-dots"></div>`;
      const dotsEl=div.querySelector('.cal-dots');
      let shown=0; const max=2;
      todos.slice(0,max).forEach(t=>{ if(shown>=max)return; const dot=document.createElement('div'); dot.className='cal-dot todo-dot'+(t.done?' done-dot':''); dot.textContent=t.title; dotsEl.appendChild(dot); shown++; });
      gcals.slice(0,max-shown).forEach(ev=>{ const dot=document.createElement('div'); dot.className='cal-dot gcal-dot'; dot.textContent=ev.title; dotsEl.appendChild(dot); shown++; });
      const total=todos.length+gcals.length;
      if(total>max){ const m=document.createElement('div'); m.className='cal-dot more'; m.textContent='+'+(total-max)+' autre'+(total-max>1?'s':''); dotsEl.appendChild(m); }
    } else {
      div.innerHTML=`<div class="cal-num">${cell.d}</div>`;
    }
    grid.appendChild(div);
  });
  if(selectedDay) renderDetail(selectedDay);
}

/* ================================================================
   WEEK VIEW — lignes horaires, hauteur fixe
================================================================ */
function renderWeek(){
  const ws=new Date(calWeekStart);
  const we=new Date(ws); we.setDate(we.getDate()+6);
  const fmt=d=>d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  document.getElementById('agenda-period').textContent=fmt(ws)+' – '+fmt(we);

  const cont=document.getElementById('cal-container'); cont.innerHTML='';
  const todayStr=ds(now);
  const hs=hourStart(), he=hourEnd();

  // Build day date strings for the week
  const days=[];
  for(let i=0;i<7;i++){ const d=new Date(ws); d.setDate(d.getDate()+i); days.push({date:ds(d),d:d.getDate(),label:DAYS_FR[i]}); }

  // Wrapper
  const wrap=document.createElement('div'); wrap.className='week-wrapper'; cont.appendChild(wrap);
  const table=document.createElement('div'); table.className='week-table'; wrap.appendChild(table);

  // Header row
  const emptyHead=document.createElement('div'); emptyHead.className='week-head-empty'; table.appendChild(emptyHead);
  days.forEach(day=>{
    const col=document.createElement('div'); col.className='week-head-day';
    if(day.date===todayStr) col.classList.add('today');
    if(day.date===selectedDay) col.classList.add('selected');
    col.innerHTML=`<div class="week-day-name">${day.label}</div><div class="week-day-num">${day.d}</div>`;
    col.addEventListener('click',()=>{ selectedDay=day.date; calDay=day.date; setView('day'); });
    table.appendChild(col);
  });

  // All-day row
  const alLabel=document.createElement('div'); alLabel.style.cssText='font-size:9px;font-weight:800;color:var(--text3);text-align:right;padding-right:4px;padding-top:4px;'; alLabel.textContent='Jour'; table.appendChild(alLabel);
  days.forEach(day=>{
    const cell=document.createElement('div'); cell.className='week-allday-cell'; cell.dataset.date=day.date;
    const todos=todoForDate(day.date).filter(t=>!t.timeStart);
    const gcals=gcalForDate(day.date).filter(ev=>ev.allDay);
    todos.slice(0,2).forEach(t=>{ const el=document.createElement('div'); el.className='week-allday-task'+(t.done?' done-ev':''); el.textContent=t.title; cell.appendChild(el); });
    gcals.slice(0,2).forEach(ev=>{ const el=document.createElement('div'); el.className='week-allday-task gcal-ev'; el.textContent=ev.title; cell.appendChild(el); });
    bindDrop(cell,day.date,false);
    table.appendChild(cell);
  });

  // Time rows — FIXED height, no deformation
  for(let h=hs;h<he;h++){
    const timeLabel=document.createElement('div'); timeLabel.className='week-time-label'; timeLabel.textContent=h+'h'; table.appendChild(timeLabel);
    days.forEach(day=>{
      const cell=document.createElement('div'); cell.className='week-cell';
      if(day.date===todayStr) cell.classList.add('today-col');
      if(new Date(day.date)<new Date(ds(now))) cell.classList.add('past');
      cell.dataset.date=day.date; cell.dataset.hour=h;
      bindDrop(cell,day.date,true,h);

      // Render events that start in this hour slot
      const todos=todoForDate(day.date).filter(t=>t.timeStart&&parseInt(t.timeStart.split(':')[0])===h);
      const gcals=gcalForDate(day.date).filter(ev=>!ev.allDay&&ev.start.includes('T')&&parseInt(ev.start.split('T')[1].split(':')[0])===h);
      todos.forEach(t=>{ const ev=document.createElement('div'); ev.className='week-event todo-ev'+(t.done?' done-ev':''); ev.textContent=(t.timeStart?t.timeStart+' ':'')+t.title; cell.appendChild(ev); });
      gcals.forEach(ev=>{ const el=document.createElement('div'); el.className='week-event gcal-ev'; el.textContent=formatEvTime(ev.start)+' '+ev.title; cell.appendChild(el); });

      table.appendChild(cell);
    });
  }
  if(selectedDay) renderDetail(selectedDay);
}

/* ================================================================
   DAY VIEW
================================================================ */
function renderDay(){
  const d=new Date(calDay+'T00:00:00');
  const label=d.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('agenda-period').textContent=label.charAt(0).toUpperCase()+label.slice(1);

  const cont=document.getElementById('cal-container'); cont.innerHTML='';
  const hs=hourStart(), he=hourEnd();

  // All-day section
  const alDay=todoForDate(calDay).filter(t=>!t.timeStart);
  const alGcal=gcalForDate(calDay).filter(ev=>ev.allDay);
  if(alDay.length||alGcal.length){
    const sec=document.createElement('div'); sec.className='day-allday';
    sec.innerHTML='<div class="day-allday-title">Toute la journée</div>';
    alDay.forEach(t=>{ const r=buildDayDetailRow(t); sec.appendChild(r); });
    alGcal.forEach(ev=>{ const r=buildGcalRow(ev); sec.appendChild(r); });
    cont.appendChild(sec);
  }

  // Drop zone all-day
  const dzAll=document.createElement('div');
  dzAll.style.cssText='border:2px dashed var(--blue-border);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--text3);margin-bottom:10px;text-align:center;transition:background .12s,border-color .12s;';
  dzAll.textContent='+ Glisser ici (sans heure)';
  dzAll.dataset.date=calDay;
  bindDrop(dzAll,calDay,false);
  cont.appendChild(dzAll);

  // Time grid
  const grid=document.createElement('div'); grid.className='day-time-grid'; cont.appendChild(grid);
  for(let h=hs;h<he;h++){
    const row=document.createElement('div'); row.className='day-row';
    const tl=document.createElement('div'); tl.className='day-time'; tl.textContent=h+'h';
    const slot=document.createElement('div'); slot.className='day-slot'; slot.dataset.date=calDay; slot.dataset.hour=h;
    bindDrop(slot,calDay,true,h);

    // Todo events in this slot
    const todos=todoForDate(calDay).filter(t=>t.timeStart&&parseInt(t.timeStart.split(':')[0])===h);
    const gcals=gcalForDate(calDay).filter(ev=>!ev.allDay&&ev.start.includes('T')&&parseInt(ev.start.split('T')[1].split(':')[0])===h);

    todos.forEach((t,i)=>{
      const ev=document.createElement('div'); ev.className='day-event todo-ev'+(t.done?' done-ev':'');
      const endTxt=t.timeEnd?' – '+t.timeEnd:'';
      ev.textContent=(t.timeStart||'')+endTxt+' '+t.title;
      ev.style.top=(i*22+2)+'px';
      slot.appendChild(ev);
    });
    gcals.forEach((ev,i)=>{
      const el=document.createElement('div'); el.className='day-event gcal-ev';
      el.textContent=formatEvTime(ev.start)+' '+ev.title;
      el.style.top=((todos.length+i)*22+2)+'px';
      slot.appendChild(el);
    });

    row.appendChild(tl); row.appendChild(slot); grid.appendChild(row);
  }
  selectedDay=calDay;
  renderDetail(calDay);
}

function formatEvTime(iso){ if(!iso||!iso.includes('T')) return ''; return iso.split('T')[1].slice(0,5); }

/* ================================================================

function renderDetail(dateStr){
  const panel=document.getElementById('detail-panel');

  gcals.forEach(ev=>panel.appendChild(buildGcalRow(ev)));

function buildDayDetailRow(t){

function buildGcalRow(ev){
  const row=document.createElement('div'); row.className='gcal-event-row';

/* ================================================================
   DRAG & DROP
================================================================ */
function bindDrop(el, dateStr, withHour, hour){
  el.addEventListener('dragover',e=>{ e.preventDefault(); el.classList.add('drop-target'); });
  el.addEventListener('dragleave',()=>el.classList.remove('drop-target'));
  el.addEventListener('drop',e=>{
    e.preventDefault(); el.classList.remove('drop-target');
    const tid=e.dataTransfer.getData('taskId'); if(!tid) return;
    if(withHour && hour!==undefined){
      openModal(tid, dateStr, p2(hour)+':00', p2(hour+1 < 24 ? hour+1 : hour)+':00');
    } else {
      planTask(tid, dateStr, null, null);
    }
  });
}
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>{
  const tid=e.dataTransfer.getData('taskId'); if(!tid) return;
  const el=e.target.closest('[data-date]'); if(!el) return;
  const dateStr=el.dataset.date; const hour=el.dataset.hour;
  if(hour!==undefined){
    openModal(tid,dateStr,p2(parseInt(hour))+':00',p2(Math.min(parseInt(hour)+1,23))+':00');
  } else {
    planTask(tid,dateStr,null,null);
  }
});

/* Touch drag */
const ghost=document.getElementById('ghost-el');
function setupTouchDrag(el,taskId){
  let sx,sy;
  el.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
  el.addEventListener('touchmove',e=>{
    const dx=Math.abs(e.touches[0].clientX-sx), dy=Math.abs(e.touches[0].clientY-sy);
    if(dx>8||dy>8){
      if(!touchDragId){ touchDragId=taskId; const t=state.tasks.find(t=>t.id===taskId); ghost.textContent=t?t.title:''; ghost.style.display='block'; el.classList.add('dragging'); if(currentTab==='todo') switchTab('agenda'); }
      e.preventDefault();
      ghost.style.left=(e.touches[0].clientX-80)+'px'; ghost.style.top=(e.touches[0].clientY-22)+'px';
      document.querySelectorAll('[data-date]').forEach(d=>d.classList.remove('drop-target'));
      const under=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
      const tgt=under&&under.closest('[data-date]'); if(tgt) tgt.classList.add('drop-target');
    }
  },{passive:false});
  el.addEventListener('touchend',e=>{
    if(touchDragId){
      const under=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
      const tgt=under&&under.closest('[data-date]');
      if(tgt&&tgt.dataset.date){
        const h=tgt.dataset.hour;
        if(h!==undefined) openModal(touchDragId,tgt.dataset.date,p2(parseInt(h))+':00',p2(Math.min(parseInt(h)+1,23))+':00');
        else planTask(touchDragId,tgt.dataset.date,null,null);
      }
      ghost.style.display='none';
      document.querySelectorAll('[data-date]').forEach(d=>d.classList.remove('drop-target'));
      el.classList.remove('dragging'); touchDragId=null;
    }
  });
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); pendingDrop=null; }
async function confirmPlan(){
  if(!pendingDrop) return;
  const dateStr=document.getElementById('modal-date').value;
  const ts=document.getElementById('modal-time-start').value;
  const te=document.getElementById('modal-time-end').value;
  closeModal();
  await planTask(pendingDrop.taskId, dateStr, ts, te);
}

/* ================================================================
   PLAN TASK
================================================================ */
async function planTask(taskId, dateStr, timeStart, timeEnd){
  const t=state.tasks.find(t=>t.id===taskId); if(!t) return;
  t.plannedDate=dateStr; t.timeStart=timeStart||null; t.timeEnd=timeEnd||null;
  saveLocal();
  // Push to Google Calendar
  if(googleToken){
    showSync('Envoi vers Google Agenda…');
    t.gcalId = await createGCalEvent(t, dateStr, timeStart, timeEnd);
    hideSyncBar();
    await saveToDrive();
    await fetchGCalEvents();
  } else {
    saveLocal();
  }
  selectedDay=dateStr; calDay=dateStr;
  renderTasks(); renderAgenda();
  const hTxt=timeStart?' à '+timeStart:'';
  showToast('📌 "'+t.title.slice(0,20)+'" planifié'+hTxt);
}

/* ================================================================
   CRUD
================================================================ */
function addTask(){
  const title=document.getElementById('task-input').value.trim(); if(!title) return;
  const due=document.getElementById('date-input').value||null;
  state.tasks.unshift({id:genId(),title,due,done:false,plannedDate:null,timeStart:null,timeEnd:null});
  saveLocal(); if(googleToken) saveToDrive();
  renderTasks();
  document.getElementById('task-input').value=''; document.getElementById('date-input').value='';
}
function toggleDone(id){
  const t=state.tasks.find(t=>t.id===id); if(!t) return;
  t.done=!t.done; saveLocal(); if(googleToken) saveToDrive();
  renderTasks();
}
function deleteTask(id){
  state.tasks=state.tasks.filter(t=>t.id!==id);
  saveLocal(); if(googleToken) saveToDrive();
  renderTasks(); if(currentTab==='agenda') renderAgenda();
}
function removePlanned(id){
  const t=state.tasks.find(t=>t.id===id); if(!t) return;
  t.plannedDate=null; t.timeStart=null; t.timeEnd=null;
  saveLocal(); if(googleToken) saveToDrive();
  renderTasks(); renderAgenda();
}

/* ================================================================
   RENDER TASKS
================================================================ */
function renderTasks(){
  const todoList=document.getElementById('todo-list');
  const doneList=document.getElementById('done-list');
  const doneBlock=document.getElementById('done-block');
  const dragHint=document.getElementById('drag-hint');
  const todo=state.tasks.filter(t=>!t.done), done=state.tasks.filter(t=>t.done);
  todoList.innerHTML=''; doneList.innerHTML='';
  if(!todo.length){ todoList.innerHTML='<div class="empty-msg">Aucune tâche — bien joué 🎉</div>'; dragHint.style.display='none'; }
  else { todo.forEach(t=>todoList.appendChild(buildTaskEl(t))); dragHint.style.display='block'; }
  doneBlock.style.display=done.length?'block':'none';
  done.forEach(t=>doneList.appendChild(buildTaskEl(t)));
}
function buildTaskEl(t){
  const el=document.createElement('div'); el.className='task-item'+(t.done?' done':''); el.dataset.id=t.id; el.draggable=true;
  const todayStr=ds(now); const overdue=t.due&&t.due<todayStr&&!t.done;
  el.innerHTML=`
    <div class="task-check" onclick="toggleDone('${t.id}')">
      <svg width="11" height="9" viewBox="0 0 11 9" fill="none"><path d="M1 4.5L4 7.5L10 1.5" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="task-body">
      <div class="task-title">${escHtml(t.title)}</div>
      <div class="task-meta">
        ${t.due?`<div class="task-date${overdue?' overdue':''}">📅 ${formatDate(t.due)}</div>`:''}
        ${t.plannedDate?`<div class="badge-planned">📌 ${t.timeStart?t.timeStart+' ':''} ${formatDate(t.plannedDate)}</div>`:''}
        ${t.gcalId?`<div class="badge-gcal">✓ Google</div>`:''}
      </div>
    </div>
    <button class="btn-del" onclick="deleteTask('${t.id}')">×</button>`;
  el.addEventListener('dragstart',e=>{ e.dataTransfer.setData('taskId',t.id); el.classList.add('dragging'); setTimeout(()=>{ if(currentTab==='todo') switchTab('agenda'); },350); });
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  setupTouchDrag(el,t.id);
  return el;
}

/* ================================================================
   UTILS
================================================================ */
function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(s){ if(!s)return''; const d=new Date(s+'T00:00:00'); return d.toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800); }

/* ================================================================
   INIT
================================================================ */
state = loadLocal();
document.getElementById('task-input').addEventListener('keydown',e=>{ if(e.key==='Enter') addTask(); });
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });
renderTasks();
// Render agenda once loaded
setTimeout(renderAgenda, 100);
</script>
